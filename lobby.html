<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chip Poker — Lobby</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { background: #0a0a0f; font-family: 'Inter', sans-serif; color: white; min-height: 100vh; padding-bottom: 32px; }

        .header {
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(212,175,55,0.15);
            padding: 16px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .back-btn {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 8px 14px; border-radius: 10px; cursor: pointer;
            font-size: 13px; font-family: 'Inter', sans-serif;
        }
        .back-btn:active { transform: scale(0.96); }
        .header-logo {
            font-family: 'Playfair Display', serif; font-size: 20px;
            background: linear-gradient(135deg, #f5d76e, #c9952a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .header-balance {
            font-size: 14px; font-weight: 700; color: #f5d76e;
            background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.2);
            padding: 6px 14px; border-radius: 20px;
        }
        .lang-btn {
            background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.3);
            border-radius: 40px; padding: 6px 12px;
            font-size: 12px; font-weight: 600; color: #f5d76e;
            cursor: pointer; font-family: 'Inter', sans-serif;
        }

        .lang-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 999; align-items: center; justify-content: center; }
        .lang-overlay.open { display: flex; }
        .lang-modal { background: rgba(10,10,20,0.98); border: 1px solid rgba(212,175,55,0.3); border-radius: 24px; padding: 24px 20px; max-width: 320px; width: 90%; }
        .lang-modal-title { font-size: 15px; font-weight: 700; color: #f5d76e; text-align: center; margin-bottom: 16px; }
        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .lang-opt { background: rgba(255,255,255,0.04); border: 1px solid rgba(212,175,55,0.15); border-radius: 12px; padding: 10px 14px; font-size: 13px; color: white; cursor: pointer; font-family: 'Inter', sans-serif; text-align: left; transition: all 0.15s; }
        .lang-opt:hover { background: rgba(212,175,55,0.1); border-color: rgba(212,175,55,0.4); }
        .lang-opt.active { border-color: #f5d76e; color: #f5d76e; background: rgba(212,175,55,0.1); }

        .content { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

        .quick-join {
            background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(201,149,42,0.05));
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 20px; padding: 20px; margin-bottom: 24px; text-align: center;
        }
        .quick-join-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: #f5d76e; }
        .quick-join-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 16px; }
        .btn-quick {
            width: 100%; padding: 16px; font-size: 16px; font-weight: 700;
            background: linear-gradient(135deg, #f5d76e, #c9952a);
            color: #1a0a00; border: none; border-radius: 50px;
            cursor: pointer; font-family: 'Inter', sans-serif;
            box-shadow: 0 6px 24px rgba(201,149,42,0.4);
        }
        .btn-quick:active { transform: scale(0.97); }

        .section-title { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }

        .tables-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

        .table-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; transition: all 0.15s; }
        .table-card.playing { border-color: rgba(34,197,94,0.2); }
        .table-card.waiting { border-color: rgba(212,175,55,0.2); }
        .table-card.full { border-color: rgba(239,68,68,0.2); opacity: 0.7; }

        .table-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        .table-icon.playing { background: rgba(34,197,94,0.1); }
        .table-icon.waiting { background: rgba(212,175,55,0.1); }
        .table-icon.full { background: rgba(239,68,68,0.1); }

        .table-info { flex: 1; }
        .table-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .table-meta { font-size: 12px; color: rgba(255,255,255,0.4); }
        .table-players-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
        .player-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); }
        .player-dot.filled { background: #22c55e; }

        .table-status-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
        .badge-playing { background: rgba(34,197,94,0.15); color: #22c55e; }
        .badge-waiting { background: rgba(212,175,55,0.1); color: #f5d76e; }
        .badge-full { background: rgba(239,68,68,0.1); color: #ef4444; }

        .join-btn { padding: 10px 18px; font-size: 13px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; font-family: 'Inter', sans-serif; white-space: nowrap; transition: transform 0.08s; }
        .join-btn:active { transform: scale(0.95); }
        .join-btn.can-join { background: linear-gradient(135deg, #f5d76e, #c9952a); color: #1a0a00; }
        .join-btn.playing-btn { background: linear-gradient(135deg, #14532d, #16a34a); color: white; }
        .join-btn.full-btn { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); cursor: not-allowed; }

        .create-table-btn { width: 100%; padding: 16px; background: rgba(255,255,255,0.04); border: 1px dashed rgba(212,175,55,0.3); color: #f5d76e; border-radius: 18px; cursor: pointer; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif; margin-bottom: 24px; }
        .create-table-btn:active { transform: scale(0.98); }

        .blinds-section { margin-bottom: 24px; }
        .blinds-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .blind-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 12px; text-align: center; cursor: pointer; transition: all 0.15s; }
        .blind-card.selected { border-color: rgba(212,175,55,0.4); background: rgba(212,175,55,0.08); }
        .blind-card:active { transform: scale(0.97); }
        .blind-val { font-size: 16px; font-weight: 700; color: #f5d76e; }
        .blind-lbl { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }

        .refresh-row { display: flex; justify-content: center; margin-bottom: 16px; }
        .refresh-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: 'Inter', sans-serif; }
        .loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <button class="back-btn" id="btnBack" onclick="window.location.href='/profile'">← Профиль</button>
        <div class="header-logo">♠ CHIP POKER</div>
    </div>
    <div class="header-right">
        <div class="header-balance">⭐ <span id="headerBalance">—</span></div>
        <button class="lang-btn" id="langBtn" onclick="openLangModal()">🌐 RU</button>
    </div>
</div>

<div class="lang-overlay" id="langOverlay" onclick="closeLangModal(event)">
    <div class="lang-modal" onclick="event.stopPropagation()">
        <div class="lang-modal-title" id="langModalTitle">🌐 Выберите язык</div>
        <div class="lang-grid" id="langGrid"></div>
    </div>
</div>

<div class="content">
    <div class="quick-join">
        <div class="quick-join-title" id="lblQuickTitle">🎰 Быстрая игра</div>
        <div class="quick-join-sub" id="lblQuickSub">Сядь за первый свободный стол</div>
        <button class="btn-quick" id="btnQuick" onclick="quickJoin()">⚡ Играть сейчас</button>
    </div>

    <div class="blinds-section">
        <div class="section-title" id="lblBlinds">Блайнды</div>
        <div class="blinds-grid">
            <div class="blind-card selected" onclick="selectBlinds(this, 5, 10)">
                <div class="blind-val">5/10</div>
                <div class="blind-lbl" id="lblBeginner">Новичок</div>
            </div>
            <div class="blind-card" onclick="selectBlinds(this, 25, 50)">
                <div class="blind-val">25/50</div>
                <div class="blind-lbl" id="lblMedium">Средний</div>
            </div>
            <div class="blind-card" onclick="selectBlinds(this, 50, 100)">
                <div class="blind-val">50/100</div>
                <div class="blind-lbl" id="lblHigh">Высокий</div>
            </div>
        </div>
    </div>

    <div class="section-title" id="lblTables">Столы</div>
    <div class="refresh-row">
        <button class="refresh-btn" id="btnRefresh" onclick="loadTables()">🔄 Обновить</button>
    </div>
    <div class="tables-list" id="tablesList">
        <div class="loading">Загрузка столов...</div>
    </div>

    <button class="create-table-btn" id="btnCreate" onclick="createTable()">➕ Создать новый стол</button>
</div>

<script>
    // ===== ПЕРЕВОДЫ =====
    const TRANSLATIONS = {
        ru: { flag:'🇷🇺', name:'Русский',
            selectLang:'🌐 Выберите язык',
            back:'← Профиль', quickTitle:'🎰 Быстрая игра', quickSub:'Сядь за первый свободный стол',
            quickBtn:'⚡ Играть сейчас', blinds:'Блайнды', beginner:'Новичок', medium:'Средний', high:'Высокий',
            tables:'Столы', refresh:'🔄 Обновить', create:'➕ Создать новый стол',
            tableTitle:n=>`Стол #${n}`, tableMeta:'Блайнды 5/10 • до 6 игроков',
            statusPlaying:'🔥 Игра', statusWaiting:'⏳ Ждём', statusFull:'🔴 Занят',
            btnJoin:'Сесть', btnEnter:'Войти', btnFull:'Занято', loading:'Загрузка столов...',
        },
        en: { flag:'🇬🇧', name:'English',
            selectLang:'🌐 Select language',
            back:'← Profile', quickTitle:'🎰 Quick Game', quickSub:'Join the first available table',
            quickBtn:'⚡ Play now', blinds:'Blinds', beginner:'Beginner', medium:'Medium', high:'High',
            tables:'Tables', refresh:'🔄 Refresh', create:'➕ Create new table',
            tableTitle:n=>`Table #${n}`, tableMeta:'Blinds 5/10 • up to 6 players',
            statusPlaying:'🔥 Playing', statusWaiting:'⏳ Waiting', statusFull:'🔴 Full',
            btnJoin:'Sit down', btnEnter:'Enter', btnFull:'Full', loading:'Loading tables...',
        },
        fr: { flag:'🇫🇷', name:'Français',
            selectLang:'🌐 Choisir la langue',
            back:'← Profil', quickTitle:'🎰 Jeu rapide', quickSub:'Rejoindre la première table disponible',
            quickBtn:'⚡ Jouer maintenant', blinds:'Blindes', beginner:'Débutant', medium:'Moyen', high:'Élevé',
            tables:'Tables', refresh:'🔄 Actualiser', create:'➕ Créer une table',
            tableTitle:n=>`Table #${n}`, tableMeta:'Blindes 5/10 • jusqu\'à 6 joueurs',
            statusPlaying:'🔥 En jeu', statusWaiting:'⏳ Attente', statusFull:'🔴 Complet',
            btnJoin:'S\'asseoir', btnEnter:'Entrer', btnFull:'Complet', loading:'Chargement...',
        },
        es: { flag:'🇪🇸', name:'Español',
            selectLang:'🌐 Seleccionar idioma',
            back:'← Perfil', quickTitle:'🎰 Juego rápido', quickSub:'Únete a la primera mesa disponible',
            quickBtn:'⚡ Jugar ahora', blinds:'Ciegas', beginner:'Principiante', medium:'Medio', high:'Alto',
            tables:'Mesas', refresh:'🔄 Actualizar', create:'➕ Crear nueva mesa',
            tableTitle:n=>`Mesa #${n}`, tableMeta:'Ciegas 5/10 • hasta 6 jugadores',
            statusPlaying:'🔥 Jugando', statusWaiting:'⏳ Esperando', statusFull:'🔴 Lleno',
            btnJoin:'Sentarse', btnEnter:'Entrar', btnFull:'Lleno', loading:'Cargando mesas...',
        },
        zh: { flag:'🇨🇳', name:'中文',
            selectLang:'🌐 选择语言',
            back:'← 个人资料', quickTitle:'🎰 快速游戏', quickSub:'加入第一个可用桌',
            quickBtn:'⚡ 立即游戏', blinds:'盲注', beginner:'新手', medium:'中级', high:'高级',
            tables:'桌子', refresh:'🔄 刷新', create:'➕ 创建新桌',
            tableTitle:n=>`桌子 #${n}`, tableMeta:'盲注 5/10 • 最多6名玩家',
            statusPlaying:'🔥 游戏中', statusWaiting:'⏳ 等待', statusFull:'🔴 已满',
            btnJoin:'入座', btnEnter:'进入', btnFull:'已满', loading:'加载桌子...',
        },
        hi: { flag:'🇮🇳', name:'हिन्दी',
            selectLang:'🌐 भाषा चुनें',
            back:'← प्रोफ़ाइल', quickTitle:'🎰 त्वरित खेल', quickSub:'पहली उपलब्ध टेबल से जुड़ें',
            quickBtn:'⚡ अभी खेलें', blinds:'ब्लाइंड्स', beginner:'शुरुआती', medium:'मध्यम', high:'उच्च',
            tables:'टेबल', refresh:'🔄 ताज़ा करें', create:'➕ नई टेबल बनाएं',
            tableTitle:n=>`टेबल #${n}`, tableMeta:'ब्लाइंड्स 5/10 • 6 खिलाड़ी तक',
            statusPlaying:'🔥 खेल जारी', statusWaiting:'⏳ प्रतीक्षा', statusFull:'🔴 भरा हुआ',
            btnJoin:'बैठें', btnEnter:'प्रवेश', btnFull:'भरा', loading:'टेबल लोड हो रही है...',
        },
        tr: { flag:'🇹🇷', name:'Türkçe',
            selectLang:'🌐 Dil seçin',
            back:'← Profil', quickTitle:'🎰 Hızlı Oyun', quickSub:'İlk müsait masaya katıl',
            quickBtn:'⚡ Hemen oyna', blinds:'Blindler', beginner:'Başlangıç', medium:'Orta', high:'Yüksek',
            tables:'Masalar', refresh:'🔄 Yenile', create:'➕ Yeni masa oluştur',
            tableTitle:n=>`Masa #${n}`, tableMeta:'Blindler 5/10 • 6 oyuncuya kadar',
            statusPlaying:'🔥 Oyun var', statusWaiting:'⏳ Bekleniyor', statusFull:'🔴 Dolu',
            btnJoin:'Otur', btnEnter:'Gir', btnFull:'Dolu', loading:'Masalar yükleniyor...',
        },
        id: { flag:'🇮🇩', name:'Indonesia',
            selectLang:'🌐 Pilih bahasa',
            back:'← Profil', quickTitle:'🎰 Game Cepat', quickSub:'Bergabung dengan meja pertama yang tersedia',
            quickBtn:'⚡ Main sekarang', blinds:'Blinds', beginner:'Pemula', medium:'Menengah', high:'Tinggi',
            tables:'Meja', refresh:'🔄 Muat ulang', create:'➕ Buat meja baru',
            tableTitle:n=>`Meja #${n}`, tableMeta:'Blinds 5/10 • hingga 6 pemain',
            statusPlaying:'🔥 Bermain', statusWaiting:'⏳ Menunggu', statusFull:'🔴 Penuh',
            btnJoin:'Duduk', btnEnter:'Masuk', btnFull:'Penuh', loading:'Memuat meja...',
        },
    };

    let currentLang = localStorage.getItem('chippoker_lang') || 'ru';
    let T = TRANSLATIONS[currentLang] || TRANSLATIONS.ru;

    function applyLang() {
        T = TRANSLATIONS[currentLang] || TRANSLATIONS.ru;
        document.getElementById('langBtn').innerText = `${T.flag} ${currentLang.toUpperCase()}`;
        document.getElementById('langModalTitle').innerText = T.selectLang;
        document.getElementById('btnBack').innerText = T.back;
        document.getElementById('lblQuickTitle').innerText = T.quickTitle;
        document.getElementById('lblQuickSub').innerText = T.quickSub;
        document.getElementById('btnQuick').innerText = T.quickBtn;
        document.getElementById('lblBlinds').innerText = T.blinds;
        document.getElementById('lblBeginner').innerText = T.beginner;
        document.getElementById('lblMedium').innerText = T.medium;
        document.getElementById('lblHigh').innerText = T.high;
        document.getElementById('lblTables').innerText = T.tables;
        document.getElementById('btnRefresh').innerText = T.refresh;
        document.getElementById('btnCreate').innerText = T.create;
        renderLangGrid();
    }

    function renderLangGrid() {
        document.getElementById('langGrid').innerHTML = Object.entries(TRANSLATIONS).map(([code, tr]) =>
            `<button class="lang-opt${currentLang===code?' active':''}" onclick="setLang('${code}')">${tr.flag} ${tr.name}</button>`
        ).join('');
    }

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('chippoker_lang', lang);
        applyLang();
        closeLangModal();
        loadTables();
    }

    function openLangModal() { renderLangGrid(); document.getElementById('langOverlay').classList.add('open'); }
    function closeLangModal(e) {
        if (!e || e.target === document.getElementById('langOverlay'))
            document.getElementById('langOverlay').classList.remove('open');
    }

    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    function parseTgUser() {
        try {
            const u = tg?.initDataUnsafe?.user;
            if (u?.id) return u;
            const raw = tg?.initData;
            if (raw && raw.length > 0) {
                const params = new URLSearchParams(raw);
                const userStr = params.get('user');
                if (userStr) return JSON.parse(decodeURIComponent(userStr));
            }
        } catch(e) {}
        return null;
    }

    let myTelegramId = null;
    let myName = 'Player';
    let myPhoto = null;
    let selectedSB = 5, selectedBB = 10;

    const tgUser = parseTgUser();
    if (tgUser) {
        myTelegramId = String(tgUser.id);
        myName = tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : '');
        myPhoto = tgUser.photo_url || null;
    }

    if (!myTelegramId) {
        myTelegramId = localStorage.getItem('chippoker_uid');
        if (!myTelegramId) {
            myTelegramId = 'guest_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('chippoker_uid', myTelegramId);
        }
    }

    async function loadBalance() {
        try {
            const res = await fetch('/api/player/' + myTelegramId);
            const data = await res.json();
            document.getElementById('headerBalance').innerText = (data.balance || 0).toLocaleString();
        } catch(e) {}
    }

    async function loadTables() {
        document.getElementById('tablesList').innerHTML = `<div class="loading">${T.loading}</div>`;
        try {
            const res = await fetch('/tables');
            const activeTables = await res.json();
            renderTables(activeTables);
        } catch(e) {
            document.getElementById('tablesList').innerHTML = `<div class="loading">⚠️ Error</div>`;
        }
    }

    function renderTables(activeTables) {
        const list = document.getElementById('tablesList');
        const allTables = [];
        for (let i = 1; i <= 3; i++) {
            const existing = activeTables.find(t => t.id === String(i));
            allTables.push(existing || { id: String(i), players: 0, status: 'waiting', maxPlayers: 6 });
        }
        activeTables.forEach(t => { if (parseInt(t.id) > 3) allTables.push(t); });

        list.innerHTML = allTables.map(t => {
            const isFull = t.players >= t.maxPlayers;
            const isPlaying = t.status === 'playing';
            const statusClass = isFull ? 'full' : isPlaying ? 'playing' : 'waiting';
            const iconEmoji = isFull ? '🔴' : isPlaying ? '🎮' : '🃏';

            const badgeText = isFull ? T.statusFull : isPlaying ? T.statusPlaying : T.statusWaiting;
            const badgeClass = isFull ? 'badge-full' : isPlaying ? 'badge-playing' : 'badge-waiting';
            const btnText = isFull ? T.btnFull : isPlaying ? T.btnEnter : T.btnJoin;
            const btnClass = isFull ? 'full-btn' : isPlaying ? 'playing-btn' : 'can-join';

            let dotsHtml = '';
            for (let i = 0; i < 6; i++) dotsHtml += `<div class="player-dot ${i < t.players ? 'filled' : ''}"></div>`;

            return `
                <div class="table-card ${statusClass}">
                    <div class="table-icon ${statusClass}">${iconEmoji}</div>
                    <div class="table-info">
                        <div class="table-name">${T.tableTitle(t.id)}</div>
                        <div class="table-meta">${T.tableMeta}</div>
                        <div class="table-players-row">
                            ${dotsHtml}
                            <span style="font-size:11px;color:rgba(255,255,255,0.3);margin-left:4px">${t.players}/${t.maxPlayers}</span>
                        </div>
                    </div>
                    <span class="table-status-badge ${badgeClass}">${badgeText}</span>
                    ${isFull
                        ? `<button class="join-btn full-btn" disabled>${btnText}</button>`
                        : `<button class="join-btn ${btnClass}" onclick="joinTable('${t.id}')">${btnText}</button>`
                    }
                </div>
            `;
        }).join('');
    }

    function joinTable(tableId) {
        localStorage.setItem('chippoker_table', tableId);
        localStorage.setItem('chippoker_name', myName);
        localStorage.setItem('chippoker_photo', myPhoto || '');
        localStorage.setItem('chippoker_tid', myTelegramId);
        window.location.href = '/game';
    }

    function quickJoin() {
        fetch('/tables')
            .then(r => r.json())
            .then(tables => {
                const available = tables.find(t => t.players < t.maxPlayers);
                joinTable(available ? available.id : '1');
            })
            .catch(() => joinTable('1'));
    }

    function createTable() {
        fetch('/tables')
            .then(r => r.json())
            .then(tables => { joinTable(String(Math.max(3, tables.length) + 1)); })
            .catch(() => joinTable('4'));
    }

    function selectBlinds(el, sb, bb) {
        document.querySelectorAll('.blind-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedSB = sb; selectedBB = bb;
    }

    applyLang();
    loadBalance();
    loadTables();
    setInterval(loadTables, 10000);
</script>
