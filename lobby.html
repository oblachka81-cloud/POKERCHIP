<html lang="ru">

        .lang-opt.active { border-color: #f5d76e; color: #f5d76e; background: rgba(212,175,55,0.1); }

        .content { max-width: 480px; margin: 0 auto; padding: 16px; }

        .quick-join { background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(201,149,42,0.05)); border: 1px solid rgba(212,175,55,0.25); border-radius: 20px; padding: 18px; margin-bottom: 20px; text-align: center; }

        .section-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        .section-tab { padding: 12px; font-size: 14px; font-weight: 700; border-radius: 14px; cursor: pointer; font-family: 'Inter', sans-serif; border: none; text-align: center; transition: all 0.15s; }
        .section-tab.test-tab { background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.2); color: #f5d76e; }
        .section-tab.test-tab.active { background: rgba(212,175,55,0.2); border-color: #f5d76e; }
        .section-tab.stars-tab { background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.2); color: #a78bfa; }
        .section-tab.stars-tab.active { background: rgba(139,92,246,0.2); border-color: #a78bfa; }

        .tables-section { display: none; }
        .tables-section.active { display: block; }

        .tables-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

        .table-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; transition: all 0.15s; }
        .table-card.playing { border-color: rgba(34,197,94,0.2); }
        .table-card.waiting { border-color: rgba(212,175,55,0.15); }
        .table-card.full { border-color: rgba(239,68,68,0.2); opacity: 0.7; }
        .table-card.stars-table { border-color: rgba(139,92,246,0.2); background: rgba(139,92,246,0.04); }
        .table-card.stars-table.playing { border-color: rgba(34,197,94,0.3); }

        .table-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
        .table-icon.test { background: rgba(212,175,55,0.1); }
        .table-icon.stars { background: rgba(139,92,246,0.15); }
        .table-icon.playing-icon { background: rgba(34,197,94,0.1); }
        .table-icon.full-icon { background: rgba(239,68,68,0.1); }

        .table-info { flex: 1; }
        .table-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
        .table-meta { font-size: 11px; color: rgba(255,255,255,0.4); }
        .table-tier { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 8px; margin-top: 4px; }
        .tier-bronze { background: rgba(205,127,50,0.2); color: #cd7f32; }
        .tier-silver { background: rgba(192,192,192,0.15); color: #c0c0c0; }
        .tier-gold { background: rgba(255,215,0,0.15); color: #ffd700; }

        .table-players-row { display: flex; align-items: center; gap: 4px; margin-top: 4px; }
        .player-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.2); }
        .player-dot.filled { background: #22c55e; }

        .table-status-badge { font-size: 10px; padding: 3px 8px; border-radius: 16px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
        .badge-playing { background: rgba(34,197,94,0.15); color: #22c55e; }
        .badge-waiting { background: rgba(212,175,55,0.1); color: #f5d76e; }
        .badge-full { background: rgba(239,68,68,0.1); color: #ef4444; }

</head>
<body>

<div class="header">
    <div class="header-left">

</div>

<div class="lang-overlay" id="langOverlay" onclick="closeLangModal(event)">

</div>

<!-- Stars confirmation modal -->

            <button class="btn-confirm-stars" id="btnConfirmStars">🌟 Войти</button>

</div>

<div class="content">

    <div class="quick-join">

        <button class="btn-quick" id="btnQuick" onclick="quickJoin()">⚡ Играть сейчас</button>
    </div>

    <!-- ТАБЫ -->

        <button class="section-tab test-tab active" id="tabTest" onclick="switchTab('test')">⭐ Тестовые столы</button>
        <button class="section-tab stars-tab" id="tabStars" onclick="switchTab('stars')">🌟 Stars столы</button>

    <!-- ТЕСТОВЫЕ СТОЛЫ -->

        <div class="refresh-row">
            <button class="refresh-btn" onclick="loadTables()">🔄 <span id="lblRefresh">Обновить</span></button>

</div>

        currentLang = lang;
        localStorage.setItem('chippoker_lang', lang);
        applyLang();
        closeLangModal();
        renderTables(lastTables);

        document.getElementById('tabTest').classList.toggle('active', tab === 'test');

        document.getElementById('sectionStars').classList.toggle('active', tab === 'stars');
    }

    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    function parseTgUser() {
        try {
            const u = tg?.initDataUnsafe?.user;
            if (u?.id) return u;
            const raw = tg?.initData;
            if (raw && raw.length > 0) {
                const params = new URLSearchParams(raw);
                const userStr = params.get('user');
                if (userStr) return JSON.parse(decodeURIComponent(userStr));
            }
        } catch(e) {}
        return null;
    }

    let myTelegramId = null;
    let myName = 'Player';
    let myPhoto = null;

    const tgUser = parseTgUser();
    if (tgUser) {
        myTelegramId = String(tgUser.id);
        myName = tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : '');
        myPhoto = tgUser.photo_url || null;
    }

    if (!myTelegramId) {
        myTelegramId = localStorage.getItem('chippoker_uid');
        if (!myTelegramId) {
            myTelegramId = 'guest_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('chippoker_uid', myTelegramId);
        }
    }

    async function loadBalance() {
        try {
            const res = await fetch('/api/player/' + myTelegramId);
            const data = await res.json();
            document.getElementById('headerBalance').innerText = (data.balance || 0).toLocaleString();
            document.getElementById('headerStars').innerText = (data.stars_balance || 0).toLocaleString();
            myStarsBalance = data.stars_balance || 0;
        } catch(e) {}
    }

    // Конфиги столов
    const TABLE_CONFIGS = {
        test_bronze:  { type:'test',  tier:'bronze',  sb:10,  bb:20,  entryStars:0   },
        test_silver:  { type:'test',  tier:'silver',  sb:25,  bb:50,  entryStars:0   },
        test_gold:    { type:'test',  tier:'gold',    sb:50,  bb:100, entryStars:0   },
        stars_bronze: { type:'stars', tier:'bronze',  sb:10,  bb:20,  entryStars:50  },
        stars_silver: { type:'stars', tier:'silver',  sb:25,  bb:50,  entryStars:200 },
        stars_gold:   { type:'stars', tier:'gold',    sb:50,  bb:100, entryStars:500 },
    };

    // Дефолтные столы если нет активных
    const DEFAULT_TABLES = [
        { id:'t1', configId:'test_bronze',  players:0, status:'waiting', maxPlayers:6 },
        { id:'t2', configId:'test_silver',  players:0, status:'waiting', maxPlayers:6 },
        { id:'t3', configId:'test_gold',    players:0, status:'waiting', maxPlayers:6 },
        { id:'s1', configId:'stars_bronze', players:0, status:'waiting', maxPlayers:6 },
        { id:'s2', configId:'stars_silver', players:0, status:'waiting', maxPlayers:6 },
        { id:'s3', configId:'stars_gold',   players:0, status:'waiting', maxPlayers:6 },
    ];

    let lastTables = [];

    async function loadTables() {
        document.getElementById('testTablesList').innerHTML = `<div class="loading">${T.loading}</div>`;
        document.getElementById('starsTablesList').innerHTML = `<div class="loading">${T.loading}</div>`;
        try {
            const res = await fetch('/tables');
            const activeTables = await res.json();
            // Мержим с дефолтными
            const merged = DEFAULT_TABLES.map(def => {
                const active = activeTables.find(t => t.id === def.id);
                return active ? { ...def, ...active } : def;
            });
            lastTables = merged;
            renderTables(merged);
        } catch(e) {
            renderTables(DEFAULT_TABLES);
        }
    }

    function getTierLabel(tier) {
        if (tier === 'bronze') return T.tierBronze;
        if (tier === 'silver') return T.tierSilver;
        if (tier === 'gold') return T.tierGold;
        return tier;
    }

    function renderTables(tables) {
        const testTables = tables.filter(t => {
            const cfg = TABLE_CONFIGS[t.configId];
            return cfg && cfg.type === 'test';
        });
        const starsTables = tables.filter(t => {
            const cfg = TABLE_CONFIGS[t.configId];
            return cfg && cfg.type === 'stars';
        });

        document.getElementById('testTablesList').innerHTML = testTables.map(t => renderTableCard(t)).join('') || `<div class="loading">${T.loading}</div>`;
        document.getElementById('starsTablesList').innerHTML = starsTables.map(t => renderTableCard(t)).join('') || `<div class="loading">${T.loading}</div>`;
    }

    function renderTableCard(t) {
        const cfg = TABLE_CONFIGS[t.configId] || TABLE_CONFIGS.test_bronze;
        const isFull = t.players >= t.maxPlayers;
        const isPlaying = t.status === 'playing';
        const isStars = cfg.type === 'stars';

        const statusClass = isFull ? 'full' : isPlaying ? 'playing' : 'waiting';
        const cardClass = isStars ? 'stars-table' : '';
        const iconEmoji = isFull ? '🔴' : isPlaying ? '🎮' : isStars ? '💎' : '🃏';
        const iconClass = isFull ? 'full-icon' : isPlaying ? 'playing-icon' : isStars ? 'stars' : 'test';

        const badgeText = isFull ? T.statusFull : isPlaying ? T.statusPlaying : T.statusWaiting;
        const badgeClass = isFull ? 'badge-full' : isPlaying ? 'badge-playing' : 'badge-waiting';

        const tierClass = `tier-${cfg.tier}`;
        const tierLabel = getTierLabel(cfg.tier);

        let btnHtml = '';
        if (isFull) {
            btnHtml = `<button class="join-btn full-btn" disabled>${T.btnFull}</button>`;
        } else if (isStars) {
            const hasEnough = myStarsBalance >= cfg.entryStars;
            btnHtml = `<button class="join-btn ${hasEnough ? 'stars-join' : 'full-btn'}" onclick="joinStarsTable('${t.id}', '${t.configId}')" ${hasEnough ? '' : 'disabled'}>${T.btnStarsJoin}</button>`;
        } else if (isPlaying) {
            btnHtml = `<button class="join-btn playing-btn" onclick="joinTable('${t.id}', '${t.configId}')">${T.btnEnter}</button>`;
        } else {
            btnHtml = `<button class="join-btn can-join" onclick="joinTable('${t.id}', '${t.configId}')">${T.btnJoin}</button>`;
        }

        let dotsHtml = '';
        for (let i = 0; i < 6; i++) dotsHtml += `<div class="player-dot ${i < t.players ? 'filled' : ''}"></div>`;

        const entryCostHtml = isStars ? `<div class="entry-cost">🌟 ${cfg.entryStars} Stars</div>` : '';

        return `
            <div class="table-card ${statusClass} ${cardClass}">
                <div class="table-icon ${iconClass}">${iconEmoji}</div>
                <div class="table-info">
                    <div class="table-name">${isStars ? T.starsTable : T.testTable}</div>
                    <div class="table-meta">${cfg.sb}/${cfg.bb} • 6 max</div>
                    <span class="table-tier ${tierClass}">${tierLabel}</span>
                    ${entryCostHtml}
                    <div class="table-players-row">
                        ${dotsHtml}
                        <span style="font-size:10px;color:rgba(255,255,255,0.3);margin-left:4px">${t.players}/6</span>
                    </div>
                </div>
                <span class="table-status-badge ${badgeClass}">${badgeText}</span>
                ${btnHtml}
            </div>
        `;
    }

    function joinTable(tableId, configId) {
        localStorage.setItem('chippoker_table', tableId);
        localStorage.setItem('chippoker_config', configId);
        localStorage.setItem('chippoker_name', myName);
        localStorage.setItem('chippoker_photo', myPhoto || '');
        localStorage.setItem('chippoker_tid', myTelegramId);
        window.location.href = '/game';
    }

    function joinStarsTable(tableId, configId) {
        const cfg = TABLE_CONFIGS[configId];
        if (!cfg) return;

        if (myStarsBalance < cfg.entryStars) {
            alert(T.notEnoughStars + ` (${myStarsBalance}/${cfg.entryStars} 🌟)`);
            return;
        }

        // Показываем модалку подтверждения
        pendingStarsTable = { tableId, configId };
        document.getElementById('starsModalTitle').innerText = `💎 ${T.getTierLabel ? T.getTierLabel(cfg.tier) : getTierLabel(cfg.tier)}`;
        document.getElementById('starsModalSub').innerText = T.starsTable;
        document.getElementById('starsEntryVal').innerText = `🌟 ${cfg.entryStars} Stars`;
        document.getElementById('starsBlindsVal').innerText = `${cfg.sb}/${cfg.bb}`;
        document.getElementById('starsBalanceVal').innerText = `🌟 ${myStarsBalance}`;
        document.getElementById('starsModalOverlay').classList.add('open');

        document.getElementById('btnConfirmStars').onclick = async () => {
            closeStarsModal();
            // Списываем Stars через API
            const res = await fetch('/api/join-stars-table', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegramId: myTelegramId, tableConfigId: configId })
            });
            const data = await res.json();
            if (data.ok) {
                joinTable(tableId, configId);
            } else {
                alert(data.error || T.notEnoughStars);
                loadBalance();
            }
        };
    }

    function closeStarsModal() {
        document.getElementById('starsModalOverlay').classList.remove('open');
        pendingStarsTable = null;
    }

    function quickJoin() {
        const testTables = lastTables.filter(t => {
            const cfg = TABLE_CONFIGS[t.configId];
            return cfg && cfg.type === 'test' && t.players < 6;
        });
        if (testTables.length > 0) {
            const t = testTables[0];
            joinTable(t.id, t.configId);
        } else {
            joinTable('t1', 'test_bronze');
        }
    }

    applyLang();
    loadBalance();
    loadTables();
    setInterval(loadTables, 10000);
</script>
</body>
</html>
