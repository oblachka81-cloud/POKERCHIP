<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chip Poker — Лобби</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
            padding-bottom: 32px;
        }

        .header {
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(212,175,55,0.15);
            padding: 16px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }

        .back-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 8px 14px;
            border-radius: 10px; cursor: pointer;
            font-size: 13px; font-family: 'Inter', sans-serif;
        }

        .header-logo {
            font-family: 'Playfair Display', serif; font-size: 20px;
            background: linear-gradient(135deg, #f5d76e, #c9952a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .header-balance {
            font-size: 14px; font-weight: 700; color: #f5d76e;
            background: rgba(212,175,55,0.1);
            border: 1px solid rgba(212,175,55,0.2);
            padding: 6px 14px; border-radius: 20px;
        }

        .content { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

        /* QUICK JOIN */
        .quick-join {
            background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(201,149,42,0.05));
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 20px; padding: 20px;
            margin-bottom: 24px; text-align: center;
        }

        .quick-join-title {
            font-size: 18px; font-weight: 700; margin-bottom: 6px;
            color: #f5d76e;
        }

        .quick-join-sub {
            font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 16px;
        }

        .btn-quick {
            width: 100%; padding: 16px;
            font-size: 16px; font-weight: 700;
            background: linear-gradient(135deg, #f5d76e, #c9952a);
            color: #1a0a00; border: none; border-radius: 50px;
            cursor: pointer; font-family: 'Inter', sans-serif;
            box-shadow: 0 6px 24px rgba(201,149,42,0.4);
        }
        .btn-quick:active { transform: scale(0.97); }

        /* SECTION */
        .section-title {
            font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.5);
            letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* TABLES */
        .tables-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

        .table-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px; padding: 16px 18px;
            display: flex; align-items: center; gap: 14px;
            cursor: pointer; transition: all 0.15s;
        }
        .table-card:active { transform: scale(0.98); }
        .table-card.playing { border-color: rgba(34,197,94,0.2); }
        .table-card.waiting { border-color: rgba(212,175,55,0.2); }
        .table-card.full { border-color: rgba(239,68,68,0.2); opacity: 0.7; cursor: not-allowed; }

        .table-icon {
            width: 52px; height: 52px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; flex-shrink: 0;
        }
        .table-icon.playing { background: rgba(34,197,94,0.1); }
        .table-icon.waiting { background: rgba(212,175,55,0.1); }
        .table-icon.full { background: rgba(239,68,68,0.1); }

        .table-info { flex: 1; }
        .table-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .table-meta { font-size: 12px; color: rgba(255,255,255,0.4); }
        .table-players-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }

        .player-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
        }
        .player-dot.filled { background: #22c55e; }
        .player-dot.me { background: #f5d76e; }

        .table-status-badge {
            font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; white-space: nowrap;
        }
        .badge-playing { background: rgba(34,197,94,0.15); color: #22c55e; }
        .badge-waiting { background: rgba(212,175,55,0.1); color: #f5d76e; }
        .badge-full { background: rgba(239,68,68,0.1); color: #ef4444; }

        .join-btn {
            padding: 10px 18px; font-size: 13px; font-weight: 700;
            border: none; border-radius: 12px; cursor: pointer;
            font-family: 'Inter', sans-serif; white-space: nowrap;
            transition: transform 0.08s;
        }
        .join-btn:active { transform: scale(0.95); }
        .join-btn.can-join { background: linear-gradient(135deg, #f5d76e, #c9952a); color: #1a0a00; }
        .join-btn.playing-btn { background: linear-gradient(135deg, #14532d, #16a34a); color: white; }
        .join-btn.full-btn { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); cursor: not-allowed; }

        /* CREATE TABLE */
        .create-table-btn {
            width: 100%; padding: 16px;
            background: rgba(255,255,255,0.04);
            border: 1px dashed rgba(212,175,55,0.3);
            color: #f5d76e; border-radius: 18px;
            cursor: pointer; font-size: 15px; font-weight: 600;
            font-family: 'Inter', sans-serif; margin-bottom: 24px;
        }
        .create-table-btn:active { transform: scale(0.98); }

        /* BLINDS INFO */
        .blinds-section { margin-bottom: 24px; }
        .blinds-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

        .blind-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 12px;
            text-align: center; cursor: pointer;
            transition: all 0.15s;
        }
        .blind-card.selected {
            border-color: rgba(212,175,55,0.4);
            background: rgba(212,175,55,0.08);
        }
        .blind-card:active { transform: scale(0.97); }
        .blind-val { font-size: 16px; font-weight: 700; color: #f5d76e; }
        .blind-lbl { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }

        /* LOADING */
        .loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); font-size: 14px; }

        /* REFRESH */
        .refresh-row {
            display: flex; justify-content: center; margin-bottom: 16px;
        }
        .refresh-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.5); padding: 8px 20px;
            border-radius: 20px; cursor: pointer;
            font-size: 12px; font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <button class="back-btn" onclick="window.location.href='/profile'">← Профиль</button>
        <div class="header-logo">♠ CHIP POKER</div>
    </div>
    <div class="header-balance">⭐ <span id="headerBalance">—</span></div>
</div>

<div class="content">

    <!-- QUICK JOIN -->
    <div class="quick-join">
        <div class="quick-join-title">🎰 Быстрая игра</div>
        <div class="quick-join-sub">Сядь за первый свободный стол</div>
        <button class="btn-quick" onclick="quickJoin()">⚡ Играть сейчас</button>
    </div>

    <!-- BLINDS FILTER -->
    <div class="blinds-section">
        <div class="section-title">Блайнды</div>
        <div class="blinds-grid">
            <div class="blind-card selected" onclick="selectBlinds(this, 5, 10)">
                <div class="blind-val">5/10</div>
                <div class="blind-lbl">Новичок</div>
            </div>
            <div class="blind-card" onclick="selectBlinds(this, 25, 50)">
                <div class="blind-val">25/50</div>
                <div class="blind-lbl">Средний</div>
            </div>
            <div class="blind-card" onclick="selectBlinds(this, 50, 100)">
                <div class="blind-val">50/100</div>
                <div class="blind-lbl">Высокий</div>
            </div>
        </div>
    </div>

    <!-- TABLES -->
    <div class="section-title">Столы</div>
    <div class="refresh-row">
        <button class="refresh-btn" onclick="loadTables()">🔄 Обновить</button>
    </div>
    <div class="tables-list" id="tablesList">
        <div class="loading">Загрузка столов...</div>
    </div>

    <!-- CREATE TABLE -->
    <button class="create-table-btn" onclick="createTable()">
        ➕ Создать новый стол
    </button>

</div>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    function parseTgUser() {
        try {
            const u = tg?.initDataUnsafe?.user;
            if (u?.id) return u;
            const raw = tg?.initData;
            if (raw && raw.length > 0) {
                const params = new URLSearchParams(raw);
                const userStr = params.get('user');
                if (userStr) return JSON.parse(decodeURIComponent(userStr));
            }
        } catch(e) {}
        return null;
    }

    let myTelegramId = null;
    let myName = 'Игрок';
    let myPhoto = null;
    let selectedSB = 5, selectedBB = 10;

    const tgUser = parseTgUser();
    if (tgUser) {
        myTelegramId = String(tgUser.id);
        myName = tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : '');
        myPhoto = tgUser.photo_url || null;
    }

    if (!myTelegramId) {
        myTelegramId = localStorage.getItem('chippoker_uid');
        if (!myTelegramId) {
            myTelegramId = 'guest_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('chippoker_uid', myTelegramId);
        }
    }

    // Загружаем баланс
    async function loadBalance() {
        try {
            const res = await fetch('/api/player/' + myTelegramId);
            const data = await res.json();
            document.getElementById('headerBalance').innerText = (data.balance || 0).toLocaleString();
        } catch(e) {}
    }

    // Загружаем столы
    async function loadTables() {
        try {
            const res = await fetch('/tables');
            const data = await res.json();
            renderTables(data);
        } catch(e) {
            document.getElementById('tablesList').innerHTML =
                '<div class="loading">Ошибка загрузки</div>';
        }
    }

    function renderTables(tables) {
        const list = document.getElementById('tablesList');

        // Всегда показываем минимум 3 стола
        const allTables = [...tables];
        for (let i = allTables.length + 1; i <= Math.max(3, allTables.length + 1); i++) {
            if (!allTables.find(t => t.id === String(i))) {
                allTables.push({ id: String(i), players: 0, status: 'waiting', maxPlayers: 6 });
            }
        }

        list.innerHTML = allTables.map(t => {
            const isFull = t.players >= t.maxPlayers;
            const isPlaying = t.status === 'playing';
            const statusClass = isFull ? 'full' : isPlaying ? 'playing' : 'waiting';

            let badgeHtml = '';
            let btnHtml = '';
            let iconEmoji = '';

            if (isFull) {
                badgeHtml = '<span class="table-status-badge badge-full">🔴 Занят</span>';
                btnHtml = '<button class="join-btn full-btn" disabled>Занято</button>';
                iconEmoji = '🔴';
            } else if (isPlaying) {
                badgeHtml = '<span class="table-status-badge badge-playing">🔥 Игра</span>';
                btnHtml = `<button class="join-btn playing-btn" onclick="joinTable('${t.id}')">Войти</button>`;
                iconEmoji = '🎮';
            } else {
                badgeHtml = '<span class="table-status-badge badge-waiting">⏳ Ждём</span>';
                btnHtml = `<button class="join-btn can-join" onclick="joinTable('${t.id}')">Сесть</button>`;
                iconEmoji = '🃏';
            }

            // Точки игроков
            let dotsHtml = '';
            for (let i = 0; i < 6; i++) {
                dotsHtml += `<div class="player-dot ${i < t.players ? 'filled' : ''}"></div>`;
            }

            return `
                <div class="table-card ${statusClass}">
                    <div class="table-icon ${statusClass}">${iconEmoji}</div>
                    <div class="table-info">
                        <div class="table-name">Стол #${t.id}</div>
                        <div class="table-meta">Блайнды 5/10 • до 6 игроков</div>
                        <div class="table-players-row">
                            ${dotsHtml}
                            <span style="font-size:11px;color:rgba(255,255,255,0.3);margin-left:4px">${t.players}/${t.maxPlayers}</span>
                        </div>
                    </div>
                    ${badgeHtml}
                    ${btnHtml}
                </div>
            `;
        }).join('');
    }

    function joinTable(tableId) {
        // Сохраняем данные и переходим на игру
        localStorage.setItem('chippoker_table', tableId);
        localStorage.setItem('chippoker_name', myName);
        localStorage.setItem('chippoker_photo', myPhoto || '');
        localStorage.setItem('chippoker_tid', myTelegramId);
        window.location.href = '/game';
    }

    function quickJoin() {
        // Ищем стол с местами
        fetch('/tables')
            .then(r => r.json())
            .then(tables => {
                const available = tables.find(t => t.players < t.maxPlayers);
                if (available) {
                    joinTable(available.id);
                } else {
                    // Создаём новый стол
                    const newId = String(tables.length + 1);
                    joinTable(newId);
                }
            })
            .catch(() => joinTable('1'));
    }

    function createTable() {
        fetch('/tables')
            .then(r => r.json())
            .then(tables => {
                const newId = String(tables.length + 1);
                joinTable(newId);
            })
            .catch(() => joinTable('2'));
    }

    function selectBlinds(el, sb, bb) {
        document.querySelectorAll('.blind-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedSB = sb;
        selectedBB = bb;
    }

    // Инициализация
    loadBalance();
    loadTables();

    // Автообновление каждые 10 секунд
    setInterval(loadTables, 10000);
</script>
</body>
</html>
