<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chip Poker — Админ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
        }

        /* LOGIN */
        #loginScreen {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at 50% 0%, #1a0a00 0%, #0a0a0f 70%);
        }

        .login-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%; max-width: 360px;
            text-align: center;
        }

        .login-logo {
            font-size: 40px; margin-bottom: 8px;
        }

        .login-title {
            font-size: 22px; font-weight: 700;
            background: linear-gradient(135deg, #f5d76e, #c9952a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .login-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 32px; }

        .login-input {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 12px; color: white;
            font-size: 16px; font-family: 'Inter', sans-serif;
            outline: none; margin-bottom: 16px;
            letter-spacing: 2px;
        }

        .login-input:focus { border-color: rgba(212,175,55,0.5); }

        .login-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #f5d76e, #c9952a);
            color: #1a0a00; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .login-error {
            color: #ef4444; font-size: 13px; margin-top: 12px; display: none;
        }

        /* ADMIN PANEL */
        #adminPanel { display: none; }

        .header {
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(212,175,55,0.15);
            padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .header-title {
            font-size: 18px; font-weight: 700;
            background: linear-gradient(135deg, #f5d76e, #c9952a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444; padding: 8px 16px;
            border-radius: 8px; cursor: pointer;
            font-size: 13px; font-family: 'Inter', sans-serif;
        }

        .content { padding: 24px; max-width: 1200px; margin: 0 auto; }

        /* STATS GRID */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px; margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(212,175,55,0.15);
            border-radius: 16px; padding: 20px;
            text-align: center;
        }

        .stat-icon { font-size: 28px; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 700; color: #f5d76e; }
        .stat-label { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }

        /* SECTIONS */
        .section { margin-bottom: 32px; }

        .section-title {
            font-size: 16px; font-weight: 700; color: #f5d76e;
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }

        /* TABLES LIST */
        .tables-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .table-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 16px;
        }

        .table-card.playing { border-color: rgba(34,197,94,0.3); }
        .table-card.waiting { border-color: rgba(212,175,55,0.2); }

        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .table-id { font-weight: 700; font-size: 15px; }
        .table-status {
            font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600;
        }
        .status-playing { background: rgba(34,197,94,0.15); color: #22c55e; }
        .status-waiting { background: rgba(212,175,55,0.1); color: #f5d76e; }
        .status-finished { background: rgba(139,92,246,0.15); color: #a78bfa; }

        .table-players { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 10px; }
        .table-player-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
        .table-pot { color: #f5d76e; font-size: 12px; margin-bottom: 10px; }

        .close-table-btn {
            width: 100%; padding: 8px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444; border-radius: 8px;
            cursor: pointer; font-size: 12px; font-family: 'Inter', sans-serif;
        }

        /* PLAYERS TABLE */
        .search-row { display: flex; gap: 12px; margin-bottom: 16px; }

        .search-input {
            flex: 1; padding: 12px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white;
            font-size: 14px; font-family: 'Inter', sans-serif; outline: none;
        }

        .search-btn {
            padding: 12px 20px;
            background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.3);
            color: #f5d76e; border-radius: 10px;
            cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600;
        }

        .players-table {
            width: 100%; border-collapse: collapse;
        }

        .players-table th {
            text-align: left; padding: 12px 16px;
            font-size: 11px; color: rgba(255,255,255,0.4);
            text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .players-table td {
            padding: 12px 16px; font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .players-table tr:hover td { background: rgba(255,255,255,0.03); }

        .balance-cell { color: #f5d76e; font-weight: 700; }

        .action-btns { display: flex; gap: 6px; }

        .add-btn {
            padding: 5px 12px; font-size: 12px;
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.3);
            color: #22c55e; border-radius: 6px;
            cursor: pointer; font-family: 'Inter', sans-serif;
        }

        .sub-btn {
            padding: 5px 12px; font-size: 12px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444; border-radius: 6px;
            cursor: pointer; font-family: 'Inter', sans-serif;
        }

        .set-btn {
            padding: 5px 12px; font-size: 12px;
            background: rgba(139,92,246,0.15);
            border: 1px solid rgba(139,92,246,0.3);
            color: #a78bfa; border-radius: 6px;
            cursor: pointer; font-family: 'Inter', sans-serif;
        }

        /* TOP PLAYERS */
        .top-list { display: flex; flex-direction: column; gap: 8px; }

        .top-row {
            display: flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 12px 16px;
        }

        .top-rank { font-size: 16px; font-weight: 900; min-width: 28px; }
        .rank-1 { color: #ffd700; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }

        .top-name { flex: 1; font-size: 14px; font-weight: 600; }
        .top-balance { color: #f5d76e; font-weight: 700; }
        .top-games { font-size: 12px; color: rgba(255,255,255,0.4); }

        /* TOAST */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: rgba(34,197,94,0.9);
            color: white; padding: 12px 20px;
            border-radius: 12px; font-size: 14px; font-weight: 600;
            display: none; z-index: 999;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .refresh-btn {
            padding: 8px 16px;
            background: rgba(212,175,55,0.1);
            border: 1px solid rgba(212,175,55,0.3);
            color: #f5d76e; border-radius: 8px;
            cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
    <div class="login-card">
        <div class="login-logo">♠️</div>
        <div class="login-title">Chip Poker Admin</div>
        <div class="login-sub">Введите пароль для входа</div>
        <input type="password" class="login-input" id="passwordInput" placeholder="Пароль" onkeydown="if(event.key==='Enter')login()">
        <button class="login-btn" onclick="login()">Войти</button>
        <div class="login-error" id="loginError">Неверный пароль</div>
    </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
    <div class="header">
        <div class="header-title">♠ Chip Poker Admin</div>
        <div style="display:flex;gap:10px;align-items:center">
            <button class="refresh-btn" onclick="loadAll()">🔄 Обновить</button>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div class="content">
        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="statPlayers">—</div>
                <div class="stat-label">Игроков всего</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🟢</div>
                <div class="stat-value" id="statOnline">—</div>
                <div class="stat-label">Онлайн сейчас</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎰</div>
                <div class="stat-value" id="statTables">—</div>
                <div class="stat-label">Активных столов</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div class="stat-value" id="statChips">—</div>
                <div class="stat-label">Фишек в игре</div>
            </div>
        </div>

        <!-- ACTIVE TABLES -->
        <div class="section">
            <div class="section-title">🎰 Активные столы</div>
            <div class="tables-grid" id="tablesGrid">
                <div style="color:rgba(255,255,255,0.3);font-size:14px">Нет активных столов</div>
            </div>
        </div>

        <!-- TOP PLAYERS -->
        <div class="section">
            <div class="section-title">🏆 Топ игроков</div>
            <div class="top-list" id="topList"></div>
        </div>

        <!-- PLAYERS -->
        <div class="section">
            <div class="section-title">👥 Управление игроками</div>
            <div class="search-row">
                <input type="text" class="search-input" id="searchInput" placeholder="Поиск по имени или Telegram ID..." onkeydown="if(event.key==='Enter')searchPlayers()">
                <button class="search-btn" onclick="searchPlayers()">🔍 Найти</button>
            </div>
            <div style="overflow-x:auto">
                <table class="players-table">
                    <thead>
                        <tr>
                            <th>Имя</th>
                            <th>Telegram ID</th>
                            <th>Баланс</th>
                            <th>Игр</th>
                            <th>Побед</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="playersBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const BASE = '';
    let adminToken = localStorage.getItem('admin_token') || '';

    function showToast(msg, color = '#22c55e') {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.background = color.includes('#') ? color + 'ee' : color;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    async function login() {
        const password = document.getElementById('passwordInput').value;
        const res = await fetch('/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.ok) {
            adminToken = data.token;
            localStorage.setItem('admin_token', adminToken);
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadAll();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function logout() {
        adminToken = '';
        localStorage.removeItem('admin_token');
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminPanel').style.display = 'none';
    }

    async function apiGet(url) {
        const res = await fetch(url, { headers: { 'x-admin-token': adminToken } });
        if (res.status === 401) { logout(); return null; }
        return res.json();
    }

    async function apiPost(url, body) {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
            body: JSON.stringify(body)
        });
        if (res.status === 401) { logout(); return null; }
        return res.json();
    }

    async function loadAll() {
        await loadStats();
        await loadPlayers();
    }

    async function loadStats() {
        const data = await apiGet('/admin/stats');
        if (!data) return;

        document.getElementById('statPlayers').innerText = data.totalPlayers.toLocaleString();
        document.getElementById('statOnline').innerText = data.onlinePlayers;
        document.getElementById('statTables').innerText = data.activeTables;
        document.getElementById('statChips').innerText = data.totalChips.toLocaleString();

        // Tables
        const grid = document.getElementById('tablesGrid');
        if (data.tables.length === 0) {
            grid.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:14px">Нет активных столов</div>';
        } else {
            grid.innerHTML = data.tables.map(t => `
                <div class="table-card ${t.status}">
                    <div class="table-header">
                        <div class="table-id">Стол #${t.id}</div>
                        <div class="table-status status-${t.status}">${
                            t.status === 'playing' ? '🔥 Игра' :
                            t.status === 'waiting' ? '⏳ Ждём' : '✅ Завершён'
                        }</div>
                    </div>
                    <div class="table-pot">🪙 Банк: ${t.pot} фишек • ${t.round || '—'}</div>
                    <div class="table-players">
                        ${t.players.map(p => `
                            <div class="table-player-row">
                                <span>${p.name}</span>
                                <span style="color:#f5d76e">⭐ ${p.stack}</span>
                            </div>
                        `).join('')}
                    </div>
                    ${t.status === 'playing' ? `<button class="close-table-btn" onclick="closeTable('${t.id}')">⛔ Завершить стол</button>` : ''}
                </div>
            `).join('');
        }

        // Top players
        const topList = document.getElementById('topList');
        topList.innerHTML = data.topPlayers.map((p, i) => `
            <div class="top-row">
                <div class="top-rank ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}">${
                    i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`
                }</div>
                <div class="top-name">${p.name}</div>
                <div class="top-games">${p.games_played} игр</div>
                <div class="top-balance">⭐ ${p.balance.toLocaleString()}</div>
            </div>
        `).join('');
    }

    async function loadPlayers(search = '') {
        const data = await apiGet(`/admin/players?search=${encodeURIComponent(search)}`);
        if (!data) return;

        const tbody = document.getElementById('playersBody');
        tbody.innerHTML = data.map(p => `
            <tr>
                <td>${p.name || '—'}</td>
                <td style="font-size:12px;color:rgba(255,255,255,0.4)">${p.telegram_id}</td>
                <td class="balance-cell">⭐ ${p.balance.toLocaleString()}</td>
                <td>${p.games_played}</td>
                <td>${p.games_won}</td>
                <td>
                    <div class="action-btns">
                        <button class="add-btn" onclick="changeBalance('${p.telegram_id}', '${p.name}', 1)">+ Добавить</button>
                        <button class="sub-btn" onclick="changeBalance('${p.telegram_id}', '${p.name}', -1)">− Списать</button>
                        <button class="set-btn" onclick="setBalance('${p.telegram_id}', '${p.name}')">= Установить</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function searchPlayers() {
        const search = document.getElementById('searchInput').value;
        loadPlayers(search);
    }

    async function changeBalance(telegramId, name, direction) {
        const amtStr = prompt(`${direction > 0 ? 'Добавить' : 'Списать'} фишек у ${name}:`, '100');
        if (!amtStr || isNaN(amtStr)) return;
        const amount = parseInt(amtStr) * direction;
        const data = await apiPost('/admin/balance', { telegramId, amount });
        if (data?.ok) {
            showToast(`✅ Баланс ${name} обновлён: ⭐ ${data.balance}`);
            loadPlayers(document.getElementById('searchInput').value);
            loadStats();
        }
    }

    async function setBalance(telegramId, name) {
        const amtStr = prompt(`Установить баланс для ${name}:`, '1000');
        if (!amtStr || isNaN(amtStr)) return;
        const amount = parseInt(amtStr);
        const data = await apiPost('/admin/balance/set', { telegramId, amount });
        if (data?.ok) {
            showToast(`✅ Баланс ${name} установлен: ⭐ ${data.balance}`);
            loadPlayers(document.getElementById('searchInput').value);
            loadStats();
        }
    }

    async function closeTable(tableId) {
        if (!confirm(`Завершить стол #${tableId}?`)) return;
        const data = await apiPost('/admin/table/close', { tableId });
        if (data?.ok) {
            showToast('✅ Стол завершён');
            loadStats();
        }
    }

    // Проверяем если уже залогинены
    if (adminToken) {
        fetch('/admin/stats', { headers: { 'x-admin-token': adminToken } })
            .then(r => {
                if (r.ok) {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    loadAll();
                }
            });
    }

    // Автообновление каждые 30 секунд
    setInterval(() => {
        if (adminToken && document.getElementById('adminPanel').style.display !== 'none') {
            loadStats();
        }
    }, 30000);
</script>
</body>
</html>
