<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chip Poker — Рейтинг</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(212,175,55,0.15);
            padding: 16px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .back-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 8px 14px;
            border-radius: 10px; cursor: pointer;
            font-size: 13px; font-family: 'Inter', sans-serif;
        }
        .back-btn:active { transform: scale(0.96); }

        .header-title {
            font-family: 'Playfair Display', serif; font-size: 20px;
            background: linear-gradient(135deg, #f5d76e, #c9952a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .header-right { width: 70px; }

        .content { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

        /* TOP 3 */
        .top3 {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 12px; margin-bottom: 24px; padding: 20px 0;
        }

        .top3-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            flex: 1;
        }

        .top3-item.first { order: 2; }
        .top3-item.second { order: 1; }
        .top3-item.third { order: 3; }

        .top3-avatar {
            border-radius: 50%; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; position: relative;
            border: 3px solid transparent;
        }

        .top3-item.first .top3-avatar {
            width: 72px; height: 72px; font-size: 28px;
            border-color: #ffd700;
            box-shadow: 0 0 24px rgba(255,215,0,0.5);
        }
        .top3-item.second .top3-avatar {
            width: 56px; height: 56px; font-size: 22px;
            border-color: #c0c0c0;
            box-shadow: 0 0 16px rgba(192,192,192,0.3);
        }
        .top3-item.third .top3-avatar {
            width: 56px; height: 56px; font-size: 22px;
            border-color: #cd7f32;
            box-shadow: 0 0 16px rgba(205,127,50,0.3);
        }

        .top3-crown {
            position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
            font-size: 20px;
        }

        .top3-name {
            font-size: 12px; font-weight: 700; text-align: center;
            max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .top3-balance {
            font-size: 12px; font-weight: 700; color: #f5d76e;
        }

        .top3-pedestal {
            width: 100%; border-radius: 12px 12px 0 0; text-align: center;
            padding: 8px 4px; font-size: 20px;
        }
        .top3-item.first .top3-pedestal { background: rgba(255,215,0,0.15); height: 60px; }
        .top3-item.second .top3-pedestal { background: rgba(192,192,192,0.1); height: 44px; }
        .top3-item.third .top3-pedestal { background: rgba(205,127,50,0.1); height: 36px; }

        /* REST LIST */
        .lb-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

        .lb-row {
            display: flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; padding: 12px 14px;
            transition: all 0.15s;
        }

        .lb-row.me {
            border-color: rgba(212,175,55,0.4);
            background: rgba(212,175,55,0.08);
            box-shadow: 0 0 16px rgba(212,175,55,0.1);
        }

        .lb-rank {
            font-size: 14px; font-weight: 900; min-width: 28px;
            text-align: center; color: rgba(255,255,255,0.4);
        }

        .lb-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #374151, #1f2937);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700; flex-shrink: 0;
        }

        .lb-info { flex: 1; }
        .lb-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .lb-games { font-size: 11px; color: rgba(255,255,255,0.3); }
        .lb-balance { color: #f5d76e; font-weight: 700; font-size: 15px; white-space: nowrap; }

        /* MY RANK CARD */
        .my-rank-card {
            background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(201,149,42,0.05));
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 18px; padding: 16px 20px;
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 16px;
        }

        .my-rank-num {
            font-size: 32px; font-weight: 900; color: #f5d76e;
            text-shadow: 0 0 20px rgba(245,215,110,0.4);
            min-width: 60px; text-align: center;
        }

        .my-rank-info { flex: 1; }
        .my-rank-label { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; }
        .my-rank-name { font-size: 16px; font-weight: 700; margin-top: 2px; }
        .my-rank-total { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 2px; }

        .loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); font-size: 14px; }

        .section-title {
            font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.4);
            letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 12px; margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="window.location.href='/profile'">← Профиль</button>
    <div class="header-title">🏆 Рейтинг</div>
    <div class="header-right"></div>
</div>

<div class="content">

    <!-- МОЁ МЕСТО -->
    <div class="my-rank-card" id="myRankCard" style="display:none">
        <div class="my-rank-num" id="myRankNum">#—</div>
        <div class="my-rank-info">
            <div class="my-rank-label">Твоё место</div>
            <div class="my-rank-name" id="myRankName">—</div>
            <div class="my-rank-total" id="myRankTotal">из — игроков</div>
        </div>
    </div>

    <!-- TOP 3 ПЬЕДЕСТАЛ -->
    <div class="top3" id="top3" style="display:none"></div>

    <!-- СПИСОК 4-10 -->
    <div class="section-title" id="restTitle" style="display:none">Топ игроков</div>
    <div class="lb-list" id="lbList">
        <div class="loading">Загрузка...</div>
    </div>

</div>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    function parseTgUser() {
        try {
            const u = tg?.initDataUnsafe?.user;
            if (u?.id) return u;
            const raw = tg?.initData;
            if (raw && raw.length > 0) {
                const params = new URLSearchParams(raw);
                const userStr = params.get('user');
                if (userStr) return JSON.parse(decodeURIComponent(userStr));
            }
        } catch(e) {}
        return null;
    }

    let myTelegramId = null;
    let myName = 'Игрок';

    const tgUser = parseTgUser();
    if (tgUser) {
        myTelegramId = String(tgUser.id);
        myName = tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : '');
    }

    if (!myTelegramId) {
        myTelegramId = localStorage.getItem('chippoker_uid') || 'guest';
    }

    function avatarHtml(player, size) {
        if (player.photo) {
            return `<img src="${player.photo}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover">`;
        }
        return (player.name?.[0]?.toUpperCase() || '?');
    }

    async function loadLeaderboard() {
        try {
            const res = await fetch('/api/leaderboard/' + myTelegramId);
            const data = await res.json();

            const { top, myRank, total } = data;

            // Моё место
            const myRankCard = document.getElementById('myRankCard');
            myRankCard.style.display = 'flex';
            document.getElementById('myRankNum').innerText = `#${myRank}`;
            document.getElementById('myRankName').innerText = myName;
            document.getElementById('myRankTotal').innerText = `из ${total} игроков`;

            if (!top.length) {
                document.getElementById('lbList').innerHTML = '<div class="loading">Нет данных</div>';
                return;
            }

            // TOP 3 пьедестал
            const top3El = document.getElementById('top3');
            if (top.length >= 3) {
                top3El.style.display = 'flex';
                const positions = [
                    { player: top[1], cls: 'second', crown: '🥈', avatarSize: 56 },
                    { player: top[0], cls: 'first', crown: '👑', avatarSize: 72 },
                    { player: top[2], cls: 'third', crown: '🥉', avatarSize: 56 },
                ];

                top3El.innerHTML = positions.map(({ player, cls, crown, avatarSize }) => `
                    <div class="top3-item ${cls}">
                        <div class="top3-avatar" style="width:${avatarSize}px;height:${avatarSize}px;background:linear-gradient(135deg,#374151,#1f2937)">
                            <span class="top3-crown">${crown}</span>
                            ${avatarHtml(player, avatarSize)}
                        </div>
                        <div class="top3-name">${player.name || 'Игрок'}</div>
                        <div class="top3-balance">⭐ ${player.balance.toLocaleString()}</div>
                        <div class="top3-pedestal"></div>
                    </div>
                `).join('');
            }

            // Список 4-10
            const rest = top.slice(3);
            if (rest.length > 0) {
                document.getElementById('restTitle').style.display = 'block';
            }

            document.getElementById('lbList').innerHTML = rest.map((p, i) => {
                const isMe = p.telegram_id === myTelegramId;
                return `
                    <div class="lb-row ${isMe ? 'me' : ''}">
                        <div class="lb-rank">#${i + 4}</div>
                        <div class="lb-avatar">${avatarHtml(p, 40)}</div>
                        <div class="lb-info">
                            <div class="lb-name">${p.name || 'Игрок'}${isMe ? ' 👈' : ''}</div>
                            <div class="lb-games">${p.games_played} игр • ${p.games_won} побед</div>
                        </div>
                        <div class="lb-balance">⭐ ${p.balance.toLocaleString()}</div>
                    </div>
                `;
            }).join('');

            // Если топ меньше 4 -- показываем всех в списке
            if (top.length <= 3) {
                document.getElementById('lbList').innerHTML = '<div class="loading" style="padding:20px">Все игроки на пьедестале! 🏆</div>';
            }

        } catch(e) {
            document.getElementById('lbList').innerHTML = '<div class="loading">Ошибка загрузки</div>';
        }
    }

    loadLeaderboard();
</script>
</body>
</html>
