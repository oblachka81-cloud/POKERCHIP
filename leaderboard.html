<body>

<div class="header">
    <button class="back-btn" id="btnBack" onclick="window.location.href='/profile'">&#8592; Профиль</button>
    <div class="header-title" id="headerTitle">&#127942; Рейтинг</div>
    <button class="lang-btn" id="langBtn" onclick="openLangModal()">&#127760; RU</button>
</div>

<div class="lang-overlay" id="langOverlay" onclick="closeLangModal(event)">
    <div class="lang-modal" onclick="event.stopPropagation()">
        <div class="lang-modal-title" id="langModalTitle">Выберите язык</div>
        <div class="lang-grid" id="langGrid"></div>
    </div>
</div>

<div class="main-tabs">
    <button class="main-tab active" onclick="switchTab('chips')">Фишки</button>
    <button class="main-tab" onclick="switchTab('stars')">Stars</button>
    <button class="main-tab" onclick="switchTab('achievements')">Достижения</button>
    <button class="main-tab" onclick="switchTab('social')">Поделиться</button>
</div>

<div class="tab-content active" id="tab-chips">
    <div class="content">
        <div class="my-rank-card" id="myRankCard" style="display:none">
            <div class="my-rank-num" id="myRankNum">#-</div>
            <div class="my-rank-info">
                <div class="my-rank-label" id="lblMyRank">Твоё место</div>
                <div class="my-rank-name" id="myRankName">-</div>
                <div class="my-rank-total" id="myRankTotal">из - игроков</div>
            </div>
        </div>
        <div class="top3" id="top3Chips"></div>
        <div class="section-title" id="restTitleChips" style="display:none"></div>
        <div class="lb-list" id="lbChips"><div class="loading">Загрузка...</div></div>
    </div>
</div>

<div class="tab-content" id="tab-stars">
    <div class="content">
        <div class="my-rank-card">
            <div class="my-rank-num" style="color:#a78bfa">Stars</div>
            <div class="my-rank-info">
                <div class="my-rank-label">Топ по Stars</div>
                <div class="my-rank-name" id="myStarsBalance">- Stars</div>
                <div class="my-rank-total">Ваш баланс</div>
            </div>
        </div>
        <div class="top3" id="top3Stars"></div>
        <div class="section-title" id="restTitleStars" style="display:none"></div>
        <div class="lb-list" id="lbStars"><div class="loading">Загрузка...</div></div>
    </div>
</div>

<div class="tab-content" id="tab-achievements">
    <div class="content">
        <div class="achievements-grid" id="achievementsList">
            <div class="loading" style="grid-column:span 2">Загрузка...</div>
        </div>
    </div>
</div>

<div class="tab-content" id="tab-social">
    <div class="content">
        <div class="share-section">
            <button class="share-btn-big invite" onclick="inviteFriend()">Пригласить друга</button>
            <button class="share-btn-big share" onclick="shareProfile()">Поделиться профилем</button>
            <div class="ref-card">
                <div class="ref-label">Реферальная ссылка</div>
                <div class="ref-link" id="refLink">...</div>
                <button class="ref-copy-btn" onclick="copyRefLink()">Скопировать</button>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

    { id: "first_win",      icon: "\uD83C\uDCCF", name: "Первая победа",    desc: "Выиграй первую раздачу",   type: "normal", check: function(d) { return d.games_won >= 1; },       progress: function(d) { return [Math.min(d.games_won, 1), 1]; } },

var currentLang = localStorage.getItem("chippoker_lang") || "ru";
var T = TRANSLATIONS[currentLang] || TRANSLATIONS.ru;
var currentTab = "chips";

var playerData = null;

var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (tg) { tg.ready(); tg.expand(); }

function parseTgUser() {
    try {
        var u = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : null;
        if (u && u.id) return u;
        var raw = tg ? tg.initData : null;
        if (raw && raw.length > 0) {
            var params = new URLSearchParams(raw);
            var userStr = params.get("user");
            if (userStr) return JSON.parse(decodeURIComponent(userStr));
        }
    } catch(e) {}
    return null;
}

var myTelegramId = null;
var myName = "Player";
var myPhoto = null;

var tgUser = parseTgUser();
if (tgUser) {
    myTelegramId = String(tgUser.id);
    myName = tgUser.first_name + (tgUser.last_name ? " " + tgUser.last_name : "");
    myPhoto = tgUser.photo_url || null;
}
if (!myTelegramId) {
    myTelegramId = localStorage.getItem("chippoker_uid") || "guest";
}

document.getElementById("refLink").innerText = "t.me/CHIP_POKER_bot?start=ref_" + myTelegramId;

function switchTab(tab) {
    currentTab = tab;
    var tabs = ["chips", "stars", "achievements", "social"];
    var tabEls = document.querySelectorAll(".main-tab");
    for (var i = 0; i < tabEls.length; i++) {
        tabEls[i].classList.toggle("active", tabs[i] === tab);
    }
    var contents = document.querySelectorAll(".tab-content");
    for (var j = 0; j < contents.length; j++) {
        contents[j].classList.remove("active");
    }
    document.getElementById("tab-" + tab).classList.add("active");
    if (tab === "achievements" && playerData) renderAchievements(playerData);
}

function avatarHtml(player, size) {
    if (player.photo) {
        return "<img src=\"" + player.photo + "\" style=\"width:" + size + "px;height:" + size + "px;border-radius:50%;object-fit:cover\">";
    }
    return (player.name && player.name[0] ? player.name[0].toUpperCase() : "?");
}

function renderTop3(players, containerId, isStars) {
    var el = document.getElementById(containerId);
    if (players.length < 3) { el.style.display = "none"; return; }
    el.style.display = "flex";
    var positions = [
        { player: players[1], cls: "second", crown: "&#129352;", avatarSize: 56 },
        { player: players[0], cls: "first",  crown: "&#128081;", avatarSize: 72 },
        { player: players[2], cls: "third",  crown: "&#129353;", avatarSize: 56 }
    ];
    var html = "";
    for (var i = 0; i < positions.length; i++) {
        var p = positions[i];
        var val = isStars
            ? ("&#127775; " + ((p.player.stars_balance || 0).toLocaleString()))
            : ("&#11088; " + ((p.player.balance || 0).toLocaleString()));
        html += "<div class=\"top3-item " + p.cls + "\">";
        html += "<div class=\"top3-avatar\" style=\"width:" + p.avatarSize + "px;height:" + p.avatarSize + "px;background:linear-gradient(135deg,#374151,#1f2937)\">";
        html += "<span class=\"top3-crown\">" + p.crown + "</span>";
        html += avatarHtml(p.player, p.avatarSize);
        html += "</div>";
        html += "<div class=\"top3-name\">" + (p.player.name || "Player") + "</div>";
        html += "<div class=\"top3-balance" + (isStars ? " stars" : "") + "\">" + val + "</div>";
        html += "<div class=\"top3-pedestal\"></div>";
        html += "</div>";
    }
    el.innerHTML = html;
}

function formatOfPlayers(n) {
    return T.ofPlayers.replace("N", n);
}

function formatGames(n) {
    return T.games.replace("N", n);
}

function formatWins(n) {
    return T.wins.replace("N", n);
}

function renderLbList(players, containerId, titleId, isStars, startFrom) {
    var rest = players.slice(startFrom);
    var titleEl = document.getElementById(titleId);
    if (rest.length > 0) { titleEl.style.display = "block"; titleEl.innerText = T.topPlayers; }
    if (rest.length === 0) {
        document.getElementById(containerId).innerHTML = "<div class=\"loading\" style=\"padding:20px\">" + T.allOnPedestal + "</div>";
        return;
    }
    var html = "";
    for (var i = 0; i < rest.length; i++) {
        var p = rest[i];
        var isMe = p.telegram_id === myTelegramId;
        var val = isStars
            ? ("&#127775; " + ((p.stars_balance || 0).toLocaleString()))
            : ("&#11088; " + ((p.balance || 0).toLocaleString()));
        html += "<div class=\"lb-row" + (isMe ? " me" : "") + "\">";
        html += "<div class=\"lb-rank\">#" + (i + startFrom + 1) + "</div>";
        html += "<div class=\"lb-avatar\">" + avatarHtml(p, 40) + "</div>";
        html += "<div class=\"lb-info\">";
        html += "<div class=\"lb-name\">" + (p.name || "Player") + (isMe ? " &#128072;" : "") + "</div>";
        html += "<div class=\"lb-games\">" + formatGames(p.games_played) + " &bull; " + formatWins(p.games_won) + "</div>";
        html += "</div>";
        html += "<div class=\"lb-balance" + (isStars ? " stars" : "") + "\">" + val + "</div>";
        html += "</div>";
    }
    document.getElementById(containerId).innerHTML = html;
}

function loadLeaderboard() {
    fetch("/api/leaderboard/" + myTelegramId)
        .then(function(res) { return res.json(); })
        .then(function(data) {
            leaderboardData = data;
            var top = data.top;
            var myRank = data.myRank;
            var total = data.total;

            var myRankCard = document.getElementById("myRankCard");
            myRankCard.style.display = "flex";
            document.getElementById("myRankNum").innerText = "#" + myRank;
            document.getElementById("myRankName").innerText = myName;
            document.getElementById("myRankTotal").innerText = formatOfPlayers(total);

            renderTop3(top, "top3Chips", false);
            renderLbList(top, "lbChips", "restTitleChips", false, Math.min(top.length, 3));

            var topByStars = top.slice().sort(function(a, b) { return (b.stars_balance || 0) - (a.stars_balance || 0); });
            var myEntry = null;
            for (var i = 0; i < top.length; i++) {
                if (top[i].telegram_id === myTelegramId) { myEntry = top[i]; break; }
            }
            document.getElementById("myStarsBalance").innerText = ((myEntry ? myEntry.stars_balance : 0) || 0).toLocaleString() + " Stars";
            renderTop3(topByStars, "top3Stars", true);
            renderLbList(topByStars, "lbStars", "restTitleStars", true, Math.min(topByStars.length, 3));
        })
        .catch(function() {
            document.getElementById("lbChips").innerHTML = "<div class=\"loading\">" + T.error + "</div>";
            document.getElementById("lbStars").innerHTML = "<div class=\"loading\">" + T.error + "</div>";
        });
}

function loadPlayerData() {
    fetch("/api/player/" + myTelegramId)
        .then(function(res) { return res.json(); })
        .then(function(data) {
            playerData = data;
            renderAchievements(data);
        })
        .catch(function() {});
}

function renderAchievements(data) {
    var list = document.getElementById("achievementsList");
    var html = "";
    for (var i = 0; i < ACHIEVEMENTS.length; i++) {
        var ach = ACHIEVEMENTS[i];
        var unlocked = ach.check(data);
        var prog = ach.progress(data);
        var cur = prog[0];
        var max = prog[1];
        var pct = Math.round(cur / max * 100);
        html += "<div class=\"achievement-card" + (unlocked ? " unlocked " + ach.type : "") + "\">";
        html += "<div class=\"ach-icon\">" + ach.icon + "</div>";
        html += "<div class=\"ach-info\">";
        html += "<div class=\"ach-name\">" + ach.name + "</div>";
        html += "<div class=\"ach-desc\">" + ach.desc + "</div>";
        html += "<div class=\"ach-progress-bar\"><div class=\"ach-progress-fill\" style=\"width:" + pct + "%\"></div></div>";
        html += "<div class=\"ach-progress-text\">" + cur.toLocaleString() + " / " + max.toLocaleString() + "</div>";
        html += "</div></div>";
    }
    list.innerHTML = html;
}

function inviteFriend() {
    var link = "https://t.me/CHIP_POKER_bot?start=ref_" + myTelegramId;
    var text = "Zahodhi v Chip Poker - poker pryamo v Telegram!";
    if (tg && tg.openTelegramLink) {
        tg.openTelegramLink("https://t.me/share/url?url=" + encodeURIComponent(link) + "&text=" + encodeURIComponent(text));
    } else if (navigator.clipboard) {
        navigator.clipboard.writeText(link).then(function() { showToast("Ссылка скопирована!"); });
    }
}

function shareProfile() {
    localStorage.setItem("chippoker_shared", "1");
    var games = playerData ? playerData.games_played || 0 : 0;
    var wins = playerData ? playerData.games_won || 0 : 0;
    var balance = playerData ? playerData.balance || 0 : 0;
    var text = "Ya igrayu v Chip Poker! Igr: " + games + " Pobed: " + wins + " Balans: " + balance.toLocaleString();
    var link = "https://t.me/CHIP_POKER_bot";
    if (tg && tg.openTelegramLink) {
        tg.openTelegramLink("https://t.me/share/url?url=" + encodeURIComponent(link) + "&text=" + encodeURIComponent(text));
    } else if (navigator.clipboard) {
        navigator.clipboard.writeText(text + "\n" + link).then(function() { showToast("Скопировано!"); });
    }
    if (playerData) renderAchievements(playerData);
}

function copyRefLink() {
    var link = "https://t.me/CHIP_POKER_bot?start=ref_" + myTelegramId;
    if (navigator.clipboard) {
        navigator.clipboard.writeText(link).then(function() { showToast("Скопировано!"); });
    }
    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
}

function applyLang() {
    T = TRANSLATIONS[currentLang] || TRANSLATIONS.ru;
    document.getElementById("langBtn").innerText = T.flag + " " + currentLang.toUpperCase();
    document.getElementById("langModalTitle").innerText = T.selectLang;
    document.getElementById("btnBack").innerText = T.back;
    document.getElementById("headerTitle").innerText = T.title;
    document.getElementById("lblMyRank").innerText = T.myRank;
    renderLangGrid();
}

function renderLangGrid() {
    var html = "";
    var langs = Object.keys(TRANSLATIONS);
    for (var i = 0; i < langs.length; i++) {
        var code = langs[i];
        var tr = TRANSLATIONS[code];
        html += "<button class=\"lang-opt" + (currentLang === code ? " active" : "") + "\" onclick=\"setLang('" + code + "')\">" + tr.flag + " " + tr.name + "</button>";
    }
    document.getElementById("langGrid").innerHTML = html;
}

function setLang(lang) {
    currentLang = lang;
    localStorage.setItem("chippoker_lang", lang);
    applyLang();
    closeLangModal();
}

function openLangModal() {
    renderLangGrid();
    document.getElementById("langOverlay").classList.add("open");
}

function closeLangModal(e) {
    if (!e || e.target === document.getElementById("langOverlay")) {
        document.getElementById("langOverlay").classList.remove("open");
    }
}

function showToast(msg) {
    var t = document.getElementById("toast");
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(function() { t.style.display = "none"; }, 3000);
}

applyLang();
loadLeaderboard();
loadPlayerData();
</script>
</body>
</html>
