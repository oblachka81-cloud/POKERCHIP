<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chip Poker — Рейтинг</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { background: #0a0a0f; font-family: 'Inter', sans-serif; color: white; min-height: 100vh; padding-bottom: 40px; }

        .header {
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(212,175,55,0.15);
            padding: 16px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .back-btn {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 8px 14px; border-radius: 10px; cursor: pointer;
            font-size: 13px; font-family: 'Inter', sans-serif;
        }
        .back-btn:active { transform: scale(0.96); }
        .header-title {
            font-family: 'Playfair Display', serif; font-size: 20px;
            background: linear-gradient(135deg, #f5d76e, #c9952a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .lang-btn {
            background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.3);
            border-radius: 40px; padding: 6px 12px;
            font-size: 12px; font-weight: 600; color: #f5d76e;
            cursor: pointer; font-family: 'Inter', sans-serif;
        }

        .lang-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 999; align-items: center; justify-content: center; }
        .lang-overlay.open { display: flex; }
        .lang-modal { background: rgba(10,10,20,0.98); border: 1px solid rgba(212,175,55,0.3); border-radius: 24px; padding: 24px 20px; max-width: 320px; width: 90%; }
        .lang-modal-title { font-size: 15px; font-weight: 700; color: #f5d76e; text-align: center; margin-bottom: 16px; }
        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .lang-opt { background: rgba(255,255,255,0.04); border: 1px solid rgba(212,175,55,0.15); border-radius: 12px; padding: 10px 14px; font-size: 13px; color: white; cursor: pointer; font-family: 'Inter', sans-serif; text-align: left; transition: all 0.15s; }
        .lang-opt:hover { background: rgba(212,175,55,0.1); border-color: rgba(212,175,55,0.4); }
        .lang-opt.active { border-color: #f5d76e; color: #f5d76e; background: rgba(212,175,55,0.1); }

        .content { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

        .my-rank-card {
            background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(201,149,42,0.05));
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 18px; padding: 16px 20px;
            display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
        }
        .my-rank-num { font-size: 32px; font-weight: 900; color: #f5d76e; text-shadow: 0 0 20px rgba(245,215,110,0.4); min-width: 60px; text-align: center; }
        .my-rank-info { flex: 1; }
        .my-rank-label { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; }
        .my-rank-name { font-size: 16px; font-weight: 700; margin-top: 2px; }
        .my-rank-total { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 2px; }

        .top3 { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin-bottom: 24px; padding: 20px 0; }
        .top3-item { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .top3-item.first { order: 2; }
        .top3-item.second { order: 1; }
        .top3-item.third { order: 3; }

        .top3-avatar { border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: 700; position: relative; border: 3px solid transparent; }
        .top3-item.first .top3-avatar { width: 72px; height: 72px; font-size: 28px; border-color: #ffd700; box-shadow: 0 0 24px rgba(255,215,0,0.5); }
        .top3-item.second .top3-avatar { width: 56px; height: 56px; font-size: 22px; border-color: #c0c0c0; box-shadow: 0 0 16px rgba(192,192,192,0.3); }
        .top3-item.third .top3-avatar { width: 56px; height: 56px; font-size: 22px; border-color: #cd7f32; box-shadow: 0 0 16px rgba(205,127,50,0.3); }

        .top3-crown { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); font-size: 20px; }
        .top3-name { font-size: 12px; font-weight: 700; text-align: center; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .top3-balance { font-size: 12px; font-weight: 700; color: #f5d76e; }
        .top3-pedestal { width: 100%; border-radius: 12px 12px 0 0; text-align: center; padding: 8px 4px; font-size: 20px; }
        .top3-item.first .top3-pedestal { background: rgba(255,215,0,0.15); height: 60px; }
        .top3-item.second .top3-pedestal { background: rgba(192,192,192,0.1); height: 44px; }
        .top3-item.third .top3-pedestal { background: rgba(205,127,50,0.1); height: 36px; }

        .section-title { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; margin-top: 8px; }

        .lb-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .lb-row { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 12px 14px; }
        .lb-row.me { border-color: rgba(212,175,55,0.4); background: rgba(212,175,55,0.08); box-shadow: 0 0 16px rgba(212,175,55,0.1); }
        .lb-rank { font-size: 14px; font-weight: 900; min-width: 28px; text-align: center; color: rgba(255,255,255,0.4); }
        .lb-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #374151, #1f2937); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
        .lb-info { flex: 1; }
        .lb-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .lb-games { font-size: 11px; color: rgba(255,255,255,0.3); }
        .lb-balance { color: #f5d76e; font-weight: 700; font-size: 15px; white-space: nowrap; }

        .loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" id="btnBack" onclick="window.location.href='/profile'">← Профиль</button>
    <div class="header-title" id="headerTitle">🏆 Рейтинг</div>
    <button class="lang-btn" id="langBtn" onclick="openLangModal()">🌐 RU</button>
</div>

<div class="lang-overlay" id="langOverlay" onclick="closeLangModal(event)">
    <div class="lang-modal" onclick="event.stopPropagation()">
        <div class="lang-modal-title" id="langModalTitle">🌐 Выберите язык</div>
        <div class="lang-grid" id="langGrid"></div>
    </div>
</div>

<div class="content">
    <div class="my-rank-card" id="myRankCard" style="display:none">
        <div class="my-rank-num" id="myRankNum">#—</div>
        <div class="my-rank-info">
            <div class="my-rank-label" id="lblMyRank">Твоё место</div>
            <div class="my-rank-name" id="myRankName">—</div>
            <div class="my-rank-total" id="myRankTotal">из — игроков</div>
        </div>
    </div>

    <div class="top3" id="top3" style="display:none"></div>

    <div class="section-title" id="restTitle" style="display:none"></div>
    <div class="lb-list" id="lbList">
        <div class="loading">Загрузка...</div>
    </div>
</div>

<script>
    const TRANSLATIONS = {
        ru: { flag:'🇷🇺', name:'Русский',
            selectLang:'🌐 Выберите язык',
            back:'← Профиль', title:'🏆 Рейтинг', myRank:'Твоё место',
            ofPlayers:n=>`из ${n} игроков`, topPlayers:'Топ игроков',
            games:n=>`${n} игр`, wins:n=>`${n} побед`, loading:'Загрузка...',
            allOnPedestal:'Все игроки на пьедестале! 🏆', error:'Ошибка загрузки',
        },
        en: { flag:'🇬🇧', name:'English',
            selectLang:'🌐 Select language',
            back:'← Profile', title:'🏆 Leaderboard', myRank:'Your place',
            ofPlayers:n=>`of ${n} players`, topPlayers:'Top players',
            games:n=>`${n} games`, wins:n=>`${n} wins`, loading:'Loading...',
            allOnPedestal:'All players on the podium! 🏆', error:'Loading error',
        },
        fr: { flag:'🇫🇷', name:'Français',
            selectLang:'🌐 Choisir la langue',
            back:'← Profil', title:'🏆 Classement', myRank:'Votre place',
            ofPlayers:n=>`sur ${n} joueurs`, topPlayers:'Meilleurs joueurs',
            games:n=>`${n} parties`, wins:n=>`${n} victoires`, loading:'Chargement...',
            allOnPedestal:'Tous les joueurs sur le podium! 🏆', error:'Erreur de chargement',
        },
        es: { flag:'🇪🇸', name:'Español',
            selectLang:'🌐 Seleccionar idioma',
            back:'← Perfil', title:'🏆 Clasificación', myRank:'Tu lugar',
            ofPlayers:n=>`de ${n} jugadores`, topPlayers:'Mejores jugadores',
            games:n=>`${n} partidas`, wins:n=>`${n} victorias`, loading:'Cargando...',
            allOnPedestal:'¡Todos los jugadores en el podio! 🏆', error:'Error de carga',
        },
        zh: { flag:'🇨🇳', name:'中文',
            selectLang:'🌐 选择语言',
            back:'← 个人资料', title:'🏆 排行榜', myRank:'你的名次',
            ofPlayers:n=>`共${n}名玩家`, topPlayers:'顶级玩家',
            games:n=>`${n}场游戏`, wins:n=>`${n}场胜利`, loading:'加载中...',
            allOnPedestal:'所有玩家都在领奖台上！🏆', error:'加载错误',
        },
        hi: { flag:'🇮🇳', name:'हिन्दी',
            selectLang:'🌐 भाषा चुनें',
            back:'← प्रोफ़ाइल', title:'🏆 रैंकिंग', myRank:'आपका स्थान',
            ofPlayers:n=>`${n} खिलाड़ियों में से`, topPlayers:'शीर्ष खिलाड़ी',
            games:n=>`${n} खेल`, wins:n=>`${n} जीत`, loading:'लोड हो रहा है...',
            allOnPedestal:'सभी खिलाड़ी पोडियम पर! 🏆', error:'लोड त्रुटि',
        },
        tr: { flag:'🇹🇷', name:'Türkçe',
            selectLang:'🌐 Dil seçin',
            back:'← Profil', title:'🏆 Sıralama', myRank:'Sıralaман',
            ofPlayers:n=>`${n} oyuncudan`, topPlayers:'En iyi oyuncular',
            games:n=>`${n} oyun`, wins:n=>`${n} galibiyet`, loading:'Yükleniyor...',
            allOnPedestal:'Tüm oyuncular podyumda! 🏆', error:'Yükleme hatası',
        },
        id: { flag:'🇮🇩', name:'Indonesia',
            selectLang:'🌐 Pilih bahasa',
            back:'← Profil', title:'🏆 Peringkat', myRank:'Tempat kamu',
            ofPlayers:n=>`dari ${n} pemain`, topPlayers:'Pemain terbaik',
            games:n=>`${n} permainan`, wins:n=>`${n} kemenangan`, loading:'Memuat...',
            allOnPedestal:'Semua pemain di podium! 🏆', error:'Kesalahan memuat',
        },
    };

    let currentLang = localStorage.getItem('chippoker_lang') || 'ru';
    let T = TRANSLATIONS[currentLang] || TRANSLATIONS.ru;

    function applyLang() {
        T = TRANSLATIONS[currentLang] || TRANSLATIONS.ru;
        document.getElementById('langBtn').innerText = `${T.flag} ${currentLang.toUpperCase()}`;
        document.getElementById('langModalTitle').innerText = T.selectLang;
        document.getElementById('btnBack').innerText = T.back;
        document.getElementById('headerTitle').innerText = T.title;
        document.getElementById('lblMyRank').innerText = T.myRank;
        renderLangGrid();
    }

    function renderLangGrid() {
        document.getElementById('langGrid').innerHTML = Object.entries(TRANSLATIONS).map(([code, tr]) =>
            `<button class="lang-opt${currentLang===code?' active':''}" onclick="setLang('${code}')">${tr.flag} ${tr.name}</button>`
        ).join('');
    }

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('chippoker_lang', lang);
        applyLang();
        closeLangModal();
        loadLeaderboard();
    }

    function openLangModal() { renderLangGrid(); document.getElementById('langOverlay').classList.add('open'); }
    function closeLangModal(e) {
        if (!e || e.target === document.getElementById('langOverlay'))
            document.getElementById('langOverlay').classList.remove('open');
    }

    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    function parseTgUser() {
        try {
            const u = tg?.initDataUnsafe?.user;
            if (u?.id) return u;
            const raw = tg?.initData;
            if (raw && raw.length > 0) {
                const params = new URLSearchParams(raw);
                const userStr = params.get('user');
                if (userStr) return JSON.parse(decodeURIComponent(userStr));
            }
        } catch(e) {}
        return null;
    }

    let myTelegramId = null;
    let myName = 'Player';

    const tgUser = parseTgUser();
    if (tgUser) {
        myTelegramId = String(tgUser.id);
        myName = tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : '');
    }

    if (!myTelegramId) {
        myTelegramId = localStorage.getItem('chippoker_uid') || 'guest';
    }

    function avatarHtml(player, size) {
        if (player.photo) {
            return `<img src="${player.photo}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover">`;
        }
        return (player.name?.[0]?.toUpperCase() || '?');
    }

    async function loadLeaderboard() {
        document.getElementById('lbList').innerHTML = `<div class="loading">${T.loading}</div>`;
        try {
            const res = await fetch('/api/leaderboard/' + myTelegramId);
            const data = await res.json();
            const { top, myRank, total } = data;

            // Моё место
            const myRankCard = document.getElementById('myRankCard');
            myRankCard.style.display = 'flex';
            document.getElementById('myRankNum').innerText = `#${myRank}`;
            document.getElementById('myRankName').innerText = myName;
            document.getElementById('myRankTotal').innerText = T.ofPlayers(total);

            if (!top.length) {
                document.getElementById('lbList').innerHTML = `<div class="loading">${T.loading}</div>`;
                return;
            }

            // TOP 3
            const top3El = document.getElementById('top3');
            if (top.length >= 3) {
                top3El.style.display = 'flex';
                const positions = [
                    { player: top[1], cls: 'second', crown: '🥈', avatarSize: 56 },
                    { player: top[0], cls: 'first', crown: '👑', avatarSize: 72 },
                    { player: top[2], cls: 'third', crown: '🥉', avatarSize: 56 },
                ];
                top3El.innerHTML = positions.map(({ player, cls, crown, avatarSize }) => `
                    <div class="top3-item ${cls}">
                        <div class="top3-avatar" style="width:${avatarSize}px;height:${avatarSize}px;background:linear-gradient(135deg,#374151,#1f2937)">
                            <span class="top3-crown">${crown}</span>
                            ${avatarHtml(player, avatarSize)}
                        </div>
                        <div class="top3-name">${player.name || 'Player'}</div>
                        <div class="top3-balance">⭐ ${player.balance.toLocaleString()}</div>
                        <div class="top3-pedestal"></div>
                    </div>
                `).join('');
            }

            // 4-10
            const rest = top.slice(3);
            const restTitle = document.getElementById('restTitle');
            if (rest.length > 0) {
                restTitle.style.display = 'block';
                restTitle.innerText = T.topPlayers;
            }

            if (rest.length > 0) {
                document.getElementById('lbList').innerHTML = rest.map((p, i) => {
                    const isMe = p.telegram_id === myTelegramId;
                    return `
                        <div class="lb-row ${isMe ? 'me' : ''}">
                            <div class="lb-rank">#${i + 4}</div>
                            <div class="lb-avatar">${avatarHtml(p, 40)}</div>
                            <div class="lb-info">
                                <div class="lb-name">${p.name || 'Player'}${isMe ? ' 👈' : ''}</div>
                                <div class="lb-games">${T.games(p.games_played)} • ${T.wins(p.games_won)}</div>
                            </div>
                            <div class="lb-balance">⭐ ${p.balance.toLocaleString()}</div>
                        </div>
                    `;
                }).join('');
            } else {
                document.getElementById('lbList').innerHTML =
                    `<div class="loading" style="padding:20px">${T.allOnPedestal}</div>`;
            }

        } catch(e) {
            document.getElementById('lbList').innerHTML = `<div class="loading">${T.error}</div>`;
        }
    }

    applyLang();
    loadLeaderboard();
</script>
</body>
</html>
