<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chip Poker — Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { background: #0a0a0f; font-family: 'Inter', sans-serif; color: white; min-height: 100vh; padding-bottom: 32px; }

        .header {
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(212,175,55,0.15);
            padding: 16px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-logo { font-family: 'Playfair Display', serif; font-size: 22px; background: linear-gradient(135deg, #f5d76e, #c9952a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .lang-btn { background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.3); border-radius: 40px; padding: 6px 12px; font-size: 12px; font-weight: 600; color: #f5d76e; cursor: pointer; font-family: 'Inter', sans-serif; }

        .lang-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 999; align-items: center; justify-content: center; }
        .lang-overlay.open { display: flex; }
        .lang-modal { background: rgba(10,10,20,0.98); border: 1px solid rgba(212,175,55,0.3); border-radius: 24px; padding: 24px 20px; max-width: 320px; width: 90%; }
        .lang-modal-title { font-size: 15px; font-weight: 700; color: #f5d76e; text-align: center; margin-bottom: 16px; }
        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .lang-opt { background: rgba(255,255,255,0.04); border: 1px solid rgba(212,175,55,0.15); border-radius: 12px; padding: 10px 14px; font-size: 13px; color: white; cursor: pointer; font-family: 'Inter', sans-serif; text-align: left; transition: all 0.15s; }
        .lang-opt:hover { background: rgba(212,175,55,0.1); border-color: rgba(212,175,55,0.4); }
        .lang-opt.active { border-color: #f5d76e; color: #f5d76e; background: rgba(212,175,55,0.1); }

        .content { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

        .profile-card {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(212,175,55,0.2);
            border-radius: 24px; padding: 24px; text-align: center; margin-bottom: 16px;
            position: relative; overflow: hidden;
        }
        .profile-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 80px;
            background: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.12) 0%, transparent 70%);
        }
        .profile-avatar {
            width: 88px; height: 88px; border-radius: 50%;
            background: linear-gradient(135deg, #f5d76e, #c9952a);
            margin: 0 auto 12px; border: 3px solid rgba(212,175,55,0.4);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            font-size: 36px; font-weight: 700; box-shadow: 0 0 24px rgba(212,175,55,0.3);
        }
        .profile-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .profile-since { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 16px; }

        .balance-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
        .balance-card { border-radius: 16px; padding: 14px; text-align: center; }
        .balance-card.test { background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.2); }
        .balance-card.stars { background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.3); }
        .balance-card-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
        .balance-card-amount { font-size: 22px; font-weight: 700; line-height: 1.1; }
        .balance-card.test .balance-card-amount { color: #f5d76e; }
        .balance-card.stars .balance-card-amount { color: #a78bfa; }
        .balance-rank { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; text-align: center; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        .stat-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px 8px; text-align: center; }
        .stat-val { font-size: 22px; font-weight: 700; color: white; }
        .stat-lbl { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 4px; }

        .btn-lobby { width: 100%; padding: 18px; font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #f5d76e 0%, #c9952a 100%); color: #1a0a00; border: none; border-radius: 60px; cursor: pointer; letter-spacing: 0.5px; box-shadow: 0 8px 32px rgba(201,149,42,0.4); font-family: 'Inter', sans-serif; margin-bottom: 12px; transition: transform 0.08s; }
        .btn-lobby:active { transform: scale(0.97); }

        .btns-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-action { padding: 14px; font-size: 14px; font-weight: 700; border-radius: 16px; cursor: pointer; font-family: 'Inter', sans-serif; border: none; transition: transform 0.08s; text-align: center; }
        .btn-action:active { transform: scale(0.96); }
        .btn-topup { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; box-shadow: 0 4px 16px rgba(37,99,235,0.3); }
        .btn-withdraw { background: linear-gradient(135deg, #14532d, #22c55e); color: white; box-shadow: 0 4px 16px rgba(34,197,94,0.3); position: relative; }
        .soon-badge { position: absolute; top: -6px; right: -6px; background: #f5d76e; color: #1a0a00; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 10px; }
        .btn-rating { background: linear-gradient(135deg, #4c1d95, #7c3aed); color: white; box-shadow: 0 4px 16px rgba(124,58,237,0.3); }
        .btn-wallet-action { background: linear-gradient(135deg, #0e4f6e, #00b4d8); color: white; box-shadow: 0 4px 20px rgba(0,180,216,0.4); border: 1px solid rgba(0,212,255,0.3); }
        .btn-wallet-action.connected { background: linear-gradient(135deg, #064e3b, #059669); border-color: rgba(34,197,94,0.3); }

        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(34,197,94,0.9); color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; display: none; z-index: 999; white-space: nowrap; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">♠ CHIP POKER</div>
    <button class="lang-btn" id="langBtn" onclick="openLangModal()">🌐 RU</button>
</div>

<div class="lang-overlay" id="langOverlay" onclick="closeLangModal(event)">
    <div class="lang-modal" onclick="event.stopPropagation()">
        <div class="lang-modal-title" id="langModalTitle">🌐 Выберите язык</div>
        <div class="lang-grid" id="langGrid"></div>
    </div>
</div>

<div class="content">
    <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">🃏</div>
        <div class="profile-name" id="profileName">...</div>
        <div class="profile-since" id="profileSince"></div>

        <div class="balance-row">
            <div class="balance-card test">
                <div class="balance-card-label" id="lblTestBalance">⭐ Тестовые</div>
                <div class="balance-card-amount">⭐ <span id="balanceTest">—</span></div>
            </div>
            <div class="balance-card stars">
                <div class="balance-card-label" id="lblStarsBalance">🌟 Stars</div>
                <div class="balance-card-amount">🌟 <span id="balanceStars">—</span></div>
            </div>
        </div>
        <div class="balance-rank" id="balanceRank">Место в рейтинге: —</div>
    </div>

    <div class="stats-row">
        <div class="stat-item">
            <div class="stat-val" id="statGames">—</div>
            <div class="stat-lbl" id="lblGames">Игр</div>
        </div>
        <div class="stat-item">
            <div class="stat-val" id="statWins">—</div>
            <div class="stat-lbl" id="lblWins">Побед</div>
        </div>
        <div class="stat-item">
            <div class="stat-val" id="statWinRate">—</div>
            <div class="stat-lbl" id="lblWinRate">% побед</div>
        </div>
    </div>

    <button class="btn-lobby" id="btnLobby" onclick="window.location.href='/lobby'">🎰 В ЛОББИ</button>

    <div class="btns-row">
        <button class="btn-action btn-topup" id="btnTopup" onclick="topUp()">🌟 Пополнить Stars</button>
        <button class="btn-action btn-withdraw" style="position:relative" id="btnWithdraw">
            💸 Вывести
            <span class="soon-badge" id="lblSoon">Скоро</span>
        </button>
    </div>
    <div class="btns-row">
        <button class="btn-action btn-rating" id="btnRating" onclick="window.location.href='/leaderboard'">🏆 Рейтинг</button>
        <button class="btn-action btn-wallet-action" id="walletBtn" onclick="toggleWallet()">💎 Кошелёк</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const TRANSLATIONS = {
        ru: { flag:'🇷🇺', name:'Русский', selectLang:'🌐 Выберите язык', testBalance:'⭐ Тестовые', starsBalance:'🌟 Stars', rank:'Место в рейтинге', games:'Игр', wins:'Побед', winRate:'% побед', lobby:'🎰 В ЛОББИ', topup:'🌟 Пополнить Stars', withdraw:'💸 Вывести', soon:'Скоро', rating:'🏆 Рейтинг', wallet:'💎 Кошелёк', walletConnected:'✅ Кошелёк', since:'Играет с', disconnect:'Отключить кошелёк?' },
        en: { flag:'🇬🇧', name:'English', selectLang:'🌐 Select language', testBalance:'⭐ Test chips', starsBalance:'🌟 Stars', rank:'Leaderboard rank', games:'Games', wins:'Wins', winRate:'Win %', lobby:'🎰 LOBBY', topup:'🌟 Top up Stars', withdraw:'💸 Withdraw', soon:'Soon', rating:'🏆 Rating', wallet:'💎 Wallet', walletConnected:'✅ Wallet', since:'Playing since', disconnect:'Disconnect wallet?' },
        fr: { flag:'🇫🇷', name:'Français', selectLang:'🌐 Choisir la langue', testBalance:'⭐ Jetons test', starsBalance:'🌟 Stars', rank:'Classement', games:'Parties', wins:'Victoires', winRate:'% victoires', lobby:'🎰 LOBBY', topup:'🌟 Recharger Stars', withdraw:'💸 Retirer', soon:'Bientôt', rating:'🏆 Classement', wallet:'💎 Portefeuille', walletConnected:'✅ Portefeuille', since:'Joue depuis', disconnect:'Déconnecter?' },
        es: { flag:'🇪🇸', name:'Español', selectLang:'🌐 Seleccionar idioma', testBalance:'⭐ Fichas test', starsBalance:'🌟 Stars', rank:'Clasificación', games:'Partidas', wins:'Victorias', winRate:'% victorias', lobby:'🎰 LOBBY', topup:'🌟 Recargar Stars', withdraw:'💸 Retirar', soon:'Pronto', rating:'🏆 Clasificación', wallet:'💎 Cartera', walletConnected:'✅ Cartera', since:'Jugando desde', disconnect:'¿Desconectar?' },
        zh: { flag:'🇨🇳', name:'中文', selectLang:'🌐 选择语言', testBalance:'⭐ 测试筹码', starsBalance:'🌟 Stars', rank:'排行榜名次', games:'游戏', wins:'胜利', winRate:'胜率', lobby:'🎰 大厅', topup:'🌟 充值Stars', withdraw:'💸 提取', soon:'即将', rating:'🏆 排行榜', wallet:'💎 钱包', walletConnected:'✅ 钱包', since:'游戏时间', disconnect:'断开钱包?' },
        hi: { flag:'🇮🇳', name:'हिन्दी', selectLang:'🌐 भाषा चुनें', testBalance:'⭐ टेस्ट चिप', starsBalance:'🌟 Stars', rank:'रैंकिंग', games:'खेल', wins:'जीत', winRate:'जीत %', lobby:'🎰 लॉबी', topup:'🌟 Stars जमा', withdraw:'💸 निकालें', soon:'जल्द', rating:'🏆 रैंकिंग', wallet:'💎 वॉलेट', walletConnected:'✅ वॉलेट', since:'से खेल रहे हैं', disconnect:'डिस्कनेक्ट?' },
        tr: { flag:'🇹🇷', name:'Türkçe', selectLang:'🌐 Dil seçin', testBalance:'⭐ Test fişleri', starsBalance:'🌟 Stars', rank:'Sıralama', games:'Oyun', wins:'Galibiyet', winRate:'Kazanma %', lobby:'🎰 LOBİ', topup:'🌟 Stars Yükle', withdraw:'💸 Çek', soon:'Yakında', rating:'🏆 Sıralama', wallet:'💎 Cüzdan', walletConnected:'✅ Cüzdan', since:'Oyun tarihi', disconnect:'Ayır?' },
        id: { flag:'🇮🇩', name:'Indonesia', selectLang:'🌐 Pilih bahasa', testBalance:'⭐ Chip test', starsBalance:'🌟 Stars', rank:'Peringkat', games:'Permainan', wins:'Kemenangan', winRate:'% menang', lobby:'🎰 LOBI', topup:'🌟 Isi ulang Stars', withdraw:'💸 Tarik', soon:'Segera', rating:'🏆 Peringkat', wallet:'💎 Dompet', walletConnected:'✅ Dompet', since:'Bermain sejak', disconnect:'Putuskan?' },
    };

    let currentLang = localStorage.getItem('chippoker_lang') || 'ru';
    let T = TRANSLATIONS[currentLang] || TRANSLATIONS.ru;

    function applyLang() {
        T = TRANSLATIONS[currentLang] || TRANSLATIONS.ru;
        document.getElementById('langBtn').innerText = `${T.flag} ${currentLang.toUpperCase()}`;
        document.getElementById('langModalTitle').innerText = T.selectLang;
        document.getElementById('lblTestBalance').innerText = T.testBalance;
        document.getElementById('lblStarsBalance').innerText = T.starsBalance;
        document.getElementById('lblGames').innerText = T.games;
        document.getElementById('lblWins').innerText = T.wins;
        document.getElementById('lblWinRate').innerText = T.winRate;
        document.getElementById('btnLobby').innerText = T.lobby;
        document.getElementById('btnTopup').innerText = T.topup;
        document.getElementById('btnWithdraw').childNodes[0].textContent = T.withdraw + ' ';
        document.getElementById('lblSoon').innerText = T.soon;
        document.getElementById('btnRating').innerText = T.rating;
        const walletBtn = document.getElementById('walletBtn');
        walletBtn.innerText = walletBtn.classList.contains('connected') ? T.walletConnected : T.wallet;
        renderLangGrid();
        updateRankText();
    }

    function updateRankText() {
        const rankEl = document.getElementById('balanceRank');
        const rank = rankEl.dataset.rank || '—';
        rankEl.innerText = `${T.rank}: #${rank}`;
    }

    function renderLangGrid() {
        document.getElementById('langGrid').innerHTML = Object.entries(TRANSLATIONS).map(([code, tr]) =>
            `<button class="lang-opt${currentLang===code?' active':''}" onclick="setLang('${code}')">${tr.flag} ${tr.name}</button>`
        ).join('');
    }

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('chippoker_lang', lang);
        applyLang();
        closeLangModal();
    }

    function openLangModal() { renderLangGrid(); document.getElementById('langOverlay').classList.add('open'); }
    function closeLangModal(e) {
        if (!e || e.target === document.getElementById('langOverlay'))
            document.getElementById('langOverlay').classList.remove('open');
    }

    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    function parseTgUser() {
        try {
            const u = tg?.initDataUnsafe?.user;
            if (u?.id) return u;
            const raw = tg?.initData;
            if (raw && raw.length > 0) {
                const params = new URLSearchParams(raw);
                const userStr = params.get('user');
                if (userStr) return JSON.parse(decodeURIComponent(userStr));
            }
        } catch(e) {}
        return null;
    }

    let myTelegramId = null;
    let myName = 'Player';
    let myPhoto = null;
    let tonConnectUI = null;

    const tgUser = parseTgUser();
    if (tgUser) {
        myTelegramId = String(tgUser.id);
        myName = tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : '');
        myPhoto = tgUser.photo_url || null;
    }

    if (!myTelegramId) {
        myTelegramId = localStorage.getItem('chippoker_uid');
        if (!myTelegramId) {
            myTelegramId = 'guest_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('chippoker_uid', myTelegramId);
        }
    }

    document.getElementById('profileName').innerText = myName;
    if (myPhoto) {
        document.getElementById('profileAvatar').innerHTML =
            `<img src="${myPhoto}" style="width:88px;height:88px;border-radius:50%;object-fit:cover">`;
    } else {
        document.getElementById('profileAvatar').innerText = myName[0]?.toUpperCase() || '?';
    }

    async function loadProfile() {
        try {
            const res = await fetch('/api/player/' + myTelegramId);
            const data = await res.json();
            document.getElementById('balanceTest').innerText = (data.balance || 0).toLocaleString();
            document.getElementById('balanceStars').innerText = (data.stars_balance || 0).toLocaleString();
            const rankEl = document.getElementById('balanceRank');
            rankEl.dataset.rank = data.rank || '—';
            updateRankText();
            const games = data.games_played || 0;
            const wins = data.games_won || 0;
            const winRate = games > 0 ? Math.round(wins / games * 100) : 0;
            document.getElementById('statGames').innerText = games;
            document.getElementById('statWins').innerText = wins;
            document.getElementById('statWinRate').innerText = winRate + '%';
            if (data.created_at) {
                const date = new Date(data.created_at);
                document.getElementById('profileSince').innerText =
                    T.since + ' ' + date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
            }
        } catch(e) { console.error('loadProfile error:', e); }
    }

    function topUp() {
        fetch('/create-invoice', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: 100 })
        })
        .then(r => r.json())
        .then(data => { if (data.invoiceLink && tg) tg.openInvoice(data.invoiceLink); })
        .catch(() => showToast('⚠️ Error'));
    }

    function initTonConnect() {
        if (tonConnectUI) return;
        try {
            if (typeof TON_CONNECT_UI === 'undefined') return;
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://chippoker.bothost.tech/tonconnect-manifest.json',
            });
            tonConnectUI.onStatusChange(wallet => updateWalletBtn(wallet));
        } catch(e) { console.warn('TON Connect error:', e); }
    }

    function updateWalletBtn(wallet) {
        const btn = document.getElementById('walletBtn');
        if (wallet) {
            const addr = wallet.account.address;
            btn.innerText = `✅ ${addr.slice(0,6)}...${addr.slice(-4)}`;
            btn.classList.add('connected');
        } else {
            btn.innerText = T.wallet;
            btn.classList.remove('connected');
        }
    }

    function toggleWallet() {
        initTonConnect();
        if (!tonConnectUI) { showToast('⚠️ Loading...'); return; }
        if (tonConnectUI.wallet) {
            if (confirm(T.disconnect)) tonConnectUI.disconnect();
        } else {
            tonConnectUI.openModal();
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    window.addEventListener('load', () => {
        applyLang();
        initTonConnect();
        loadProfile();
    });
</script>
</body>
</html>
