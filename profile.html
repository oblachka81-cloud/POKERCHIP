<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chip Poker — Профиль</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
            padding-bottom: 32px;
        }

        /* HEADER */
        .header {
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(212,175,55,0.15);
            padding: 16px 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .header-logo {
            font-family: 'Playfair Display', serif; font-size: 22px;
            background: linear-gradient(135deg, #f5d76e, #c9952a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .content { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

        /* PROFILE CARD */
        .profile-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 24px; padding: 24px;
            text-align: center; margin-bottom: 16px;
            position: relative; overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 80px;
            background: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.12) 0%, transparent 70%);
        }

        .profile-avatar {
            width: 88px; height: 88px; border-radius: 50%;
            background: linear-gradient(135deg, #f5d76e, #c9952a);
            margin: 0 auto 12px;
            border: 3px solid rgba(212,175,55,0.4);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; font-weight: 700;
            box-shadow: 0 0 24px rgba(212,175,55,0.3);
        }

        .profile-name {
            font-size: 22px; font-weight: 700; margin-bottom: 4px;
        }

        .profile-since {
            font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 20px;
        }

        .balance-big {
            background: rgba(212,175,55,0.08);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 16px; padding: 16px;
            margin-bottom: 8px;
        }

        .balance-label { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
        .balance-amount { font-size: 36px; font-weight: 700; color: #f5d76e; text-shadow: 0 0 20px rgba(245,215,110,0.4); }
        .balance-rank { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }

        /* STATS */
        .stats-row {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 8px; margin-bottom: 16px;
        }

        .stat-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 14px 8px;
            text-align: center;
        }

        .stat-val { font-size: 22px; font-weight: 700; color: white; }
        .stat-lbl { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 4px; }

        /* BUTTONS */
        .btn-lobby {
            width: 100%; padding: 18px;
            font-size: 18px; font-weight: 700;
            background: linear-gradient(135deg, #f5d76e 0%, #c9952a 100%);
            color: #1a0a00; border: none; border-radius: 60px;
            cursor: pointer; letter-spacing: 0.5px;
            box-shadow: 0 8px 32px rgba(201,149,42,0.4);
            font-family: 'Inter', sans-serif;
            margin-bottom: 12px;
            transition: transform 0.08s;
        }
        .btn-lobby:active { transform: scale(0.97); }

        .btns-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

        .btn-secondary {
            padding: 14px; font-size: 14px; font-weight: 700;
            border-radius: 16px; cursor: pointer;
            font-family: 'Inter', sans-serif;
            border: none; transition: transform 0.08s;
        }
        .btn-secondary:active { transform: scale(0.96); }

        .btn-topup {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white; box-shadow: 0 4px 16px rgba(37,99,235,0.3);
        }

        .btn-withdraw {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12) !important;
            color: rgba(255,255,255,0.5);
            cursor: not-allowed !important;
        }

        .btn-wallet {
            width: 100%; padding: 14px; font-size: 14px; font-weight: 700;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(212,175,55,0.2);
            color: #f5d76e; border-radius: 16px;
            cursor: pointer; font-family: 'Inter', sans-serif;
            margin-bottom: 20px;
            transition: transform 0.08s;
        }
        .btn-wallet:active { transform: scale(0.97); }
        .btn-wallet.connected {
            border-color: rgba(34,197,94,0.3);
            color: #22c55e;
            background: rgba(34,197,94,0.06);
        }

        /* LEADERBOARD */
        .section-title {
            font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.6);
            letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 12px;
        }

        .lb-list { display: flex; flex-direction: column; gap: 8px; }

        .lb-row {
            display: flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; padding: 12px 14px;
        }

        .lb-row.me {
            border-color: rgba(212,175,55,0.3);
            background: rgba(212,175,55,0.06);
        }

        .lb-rank { font-size: 16px; font-weight: 900; min-width: 28px; text-align: center; }
        .rank-1 { color: #ffd700; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }
        .rank-n { color: rgba(255,255,255,0.3); }

        .lb-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #374151, #1f2937);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; flex-shrink: 0;
        }

        .lb-name { flex: 1; font-size: 14px; font-weight: 600; }
        .lb-games { font-size: 11px; color: rgba(255,255,255,0.3); }
        .lb-balance { color: #f5d76e; font-weight: 700; font-size: 14px; }

        /* LOADING */
        .loading {
            text-align: center; padding: 40px;
            color: rgba(255,255,255,0.3); font-size: 14px;
        }

        /* TOAST */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: rgba(34,197,94,0.9); color: white;
            padding: 12px 24px; border-radius: 50px;
            font-size: 14px; font-weight: 600;
            display: none; z-index: 999; white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">♠ CHIP POKER</div>
</div>

<div class="content">

    <!-- PROFILE -->
    <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">🃏</div>
        <div class="profile-name" id="profileName">Загрузка...</div>
        <div class="profile-since" id="profileSince">Загрузка...</div>

        <div class="balance-big">
            <div class="balance-label">Баланс фишек</div>
            <div class="balance-amount">⭐ <span id="balanceAmount">—</span></div>
            <div class="balance-rank" id="balanceRank">Место в рейтинге: —</div>
        </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
        <div class="stat-item">
            <div class="stat-val" id="statGames">—</div>
            <div class="stat-lbl">Игр</div>
        </div>
        <div class="stat-item">
            <div class="stat-val" id="statWins">—</div>
            <div class="stat-lbl">Побед</div>
        </div>
        <div class="stat-item">
            <div class="stat-val" id="statWinRate">—</div>
            <div class="stat-lbl">% побед</div>
        </div>
    </div>

    <!-- MAIN BUTTON -->
    <button class="btn-lobby" onclick="goLobby()">🎰 В ЛОББИ</button>

    <!-- TOPUP / WITHDRAW -->
    <div class="btns-row">
        <button class="btn-secondary btn-topup" onclick="topUp()">⭐ Пополнить</button>
        <button class="btn-secondary btn-withdraw" title="Скоро">💸 Вывести</button>
    </div>

    <!-- WALLET -->
    <button class="btn-wallet" id="walletBtn" onclick="toggleWallet()">
        💎 Подключить кошелёк TON
    </button>

    <!-- LEADERBOARD -->
    <div class="section-title">🏆 Топ игроков</div>
    <div class="lb-list" id="lbList">
        <div class="loading">Загрузка...</div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    function parseTgUser() {
        try {
            const u = tg?.initDataUnsafe?.user;
            if (u?.id) return u;
            const raw = tg?.initData;
            if (raw && raw.length > 0) {
                const params = new URLSearchParams(raw);
                const userStr = params.get('user');
                if (userStr) return JSON.parse(decodeURIComponent(userStr));
            }
        } catch(e) {}
        return null;
    }

    let myTelegramId = null;
    let myName = 'Игрок';
    let myPhoto = null;
    let tonConnectUI = null;

    const tgUser = parseTgUser();
    if (tgUser) {
        myTelegramId = String(tgUser.id);
        myName = tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : '');
        myPhoto = tgUser.photo_url || null;
    }

    if (!myTelegramId) {
        myTelegramId = localStorage.getItem('chippoker_uid');
        if (!myTelegramId) {
            myTelegramId = 'guest_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('chippoker_uid', myTelegramId);
        }
    }

    // Показываем имя и фото сразу
    document.getElementById('profileName').innerText = myName;
    if (myPhoto) {
        document.getElementById('profileAvatar').innerHTML =
            `<img src="${myPhoto}" style="width:88px;height:88px;border-radius:50%;object-fit:cover">`;
    } else {
        document.getElementById('profileAvatar').innerText = myName[0]?.toUpperCase() || '?';
    }

    // Загружаем данные игрока
    async function loadProfile() {
        try {
            // Сначала создаём/обновляем игрока
            await fetch('/api/player/' + myTelegramId);

            const res = await fetch('/api/player/' + myTelegramId);
            const data = await res.json();

            document.getElementById('balanceAmount').innerText = (data.balance || 0).toLocaleString();
            document.getElementById('balanceRank').innerText = `Место в рейтинге: #${data.rank || '—'}`;

            const games = data.games_played || 0;
            const wins = data.games_won || 0;
            const winRate = games > 0 ? Math.round(wins / games * 100) : 0;

            document.getElementById('statGames').innerText = games;
            document.getElementById('statWins').innerText = wins;
            document.getElementById('statWinRate').innerText = winRate + '%';

            if (data.created_at) {
                const date = new Date(data.created_at);
                document.getElementById('profileSince').innerText =
                    'Играет с ' + date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
            }
        } catch(e) {
            console.error('loadProfile error:', e);
        }
    }

    // Загружаем лидерборд
    async function loadLeaderboard() {
        try {
            const res = await fetch('/api/leaderboard');
            const data = await res.json();

            const list = document.getElementById('lbList');
            if (!data.length) {
                list.innerHTML = '<div class="loading">Нет данных</div>';
                return;
            }

            list.innerHTML = data.map((p, i) => {
                const isMe = p.telegram_id === myTelegramId;
                const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-n';
                const rankIcon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
                const avatarHtml = p.photo
                    ? `<img src="${p.photo}" style="width:36px;height:36px;border-radius:50%;object-fit:cover">`
                    : (p.name?.[0]?.toUpperCase() || '?');

                return `
                    <div class="lb-row ${isMe ? 'me' : ''}">
                        <div class="lb-rank ${rankClass}">${rankIcon}</div>
                        <div class="lb-avatar">${avatarHtml}</div>
                        <div style="flex:1">
                            <div class="lb-name">${p.name || 'Игрок'}${isMe ? ' 👈' : ''}</div>
                            <div class="lb-games">${p.games_played} игр</div>
                        </div>
                        <div class="lb-balance">⭐ ${p.balance.toLocaleString()}</div>
                    </div>
                `;
            }).join('');
        } catch(e) {
            console.error('loadLeaderboard error:', e);
        }
    }

    function goLobby() {
        window.location.href = '/lobby';
    }

    function topUp() {
        fetch('/create-invoice', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: 100 })
        })
        .then(r => r.json())
        .then(data => {
            if (data.invoiceLink && tg) tg.openInvoice(data.invoiceLink);
        })
        .catch(() => showToast('⚠️ Ошибка создания инвойса'));
    }

    // TON Connect
    function initTonConnect() {
        if (tonConnectUI) return;
        try {
            if (typeof TON_CONNECT_UI === 'undefined') return;
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://chippoker.bothost.tech/tonconnect-manifest.json',
            });
            tonConnectUI.onStatusChange(wallet => {
                updateWalletBtn(wallet);
            });
        } catch(e) { console.warn('TON Connect error:', e); }
    }

    function updateWalletBtn(wallet) {
        const btn = document.getElementById('walletBtn');
        if (wallet) {
            const addr = wallet.account.address;
            const short = addr.slice(0, 6) + '...' + addr.slice(-4);
            btn.innerText = `✅ ${short}`;
            btn.classList.add('connected');
        } else {
            btn.innerText = '💎 Подключить кошелёк TON';
            btn.classList.remove('connected');
        }
    }

    function toggleWallet() {
        initTonConnect();
        if (!tonConnectUI) {
            showToast('⚠️ TON Connect загружается...');
            return;
        }
        if (tonConnectUI.wallet) {
            if (confirm('Отключить кошелёк?')) {
                tonConnectUI.disconnect();
            }
        } else {
            tonConnectUI.openModal();
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    // Инициализация
    window.addEventListener('load', () => {
        initTonConnect();
        loadProfile();
        loadLeaderboard();
    });
</script>
</body>
</html>
